function openTicket(id){
  if(!CU)return;
  const tickets=getTickets();
  const t=tickets.find(x=>x.id===id);
  if(!t)return;
  // SEC: ownership check — user can only view their own tickets
  if(CU.role!=='admin' && t.uid!==CU.id){
    console.warn('SEC: unauthorized ticket access attempt', id);
    return;
  }
  activeTicketId=id;
  // Mark as read
  const ti=tickets.findIndex(x=>x.id===id);
  if(CU.role==='admin'&&!tickets[ti].read){tickets[ti].read=true;saveTickets(tickets);updateAdminBadge();}
  if(CU.role!=='admin'){
    // mark admin messages as readByUser
    let changed=false;
    (tickets[ti].messages||[]).forEach(m=>{if(m.role==='admin'&&!m.readByUser){m.readByUser=true;changed=true;}});
    if(changed)saveTickets(tickets);
    renderInbox(); // update badge
  }
  // Update chat header
  const CAT_MAP={bug:'🐛 Bug',feature:'💡 ฟีเจอร์',question:'❓ คำถาม',other:'📌 อื่นๆ'};
  document.getElementById('chat-title').textContent=t.subj;
  document.getElementById('chat-status').innerHTML=`
    <span>${CAT_MAP[t.cat]||'📌'}</span> ·
    <span class="status-chip ${t.resolved?'chip-resolved':'chip-open'}" style="font-size:10px;">${t.resolved?'✅ แก้แล้ว':'🔴 รอดำเนินการ'}</span>
    ${CU.role==='admin'?`<button class="btn btn-ghost btn-xs" style="margin-left:6px;" onclick="resolveTicket('${id}')">${t.resolved?'↩️ เปิดใหม่':'✅ ปิด ticket'}</button>`:''}`;
  // Render messages
  const msgs=t.messages||[];
  const msgArea=document.getElementById('chat-messages');
  msgArea.innerHTML=msgs.map(m=>{
    const isMe=m.from===CU.id;
    const isAdmin=m.role==='admin';
    return`<div class="chat-bubble-wrap ${isMe?'from-me':`from-other${isAdmin?' admin-bubble':''}`}">
      ${!isMe?`<div class="chat-sender">${isAdmin?'👑 ':''} ${escH(m.fromName)}</div>`:''}
      <div class="chat-bubble">${escH(m.text)}</div>
      <div class="chat-meta">${fmtDateTime(m.ts)}</div>
    </div>`;
  }).join('');
  msgArea.scrollTop=msgArea.scrollHeight;
  // Show input
  document.getElementById('chat-input-area').style.display='';
  document.getElementById('chat-reply-input').focus();
  // Re-render list to show active
  renderInbox();
}

function sendReply(){
  if(!CU){return;}
  const inp=document.getElementById('chat-reply-input');
  const text=sanitize(inp.value.trim()).slice(0,600);
  if(!text||!activeTicketId)return;
  const tickets=getTickets();
  const i=tickets.findIndex(t=>t.id===activeTicketId);
  if(i<0)return;
  // SEC: ownership — user can only reply to their own tickets; admin can reply to any
  if(CU.role!=='admin' && tickets[i].uid!==CU.id){
    console.warn('SEC: unauthorized reply attempt');
    return;
  }
  // SEC: prevent reply spam — max 30 messages per ticket
  if((tickets[i].messages||[]).length>=30){
    alert('จำนวนข้อความในกระทู้นี้เต็มแล้ว (สูงสุด 30 ข้อความ)');
    return;
  }
  if(!tickets[i].messages)tickets[i].messages=[];
  const msg={id:'m'+Date.now(),from:CU.id,fromName:CU.name||CU.username,role:CU.role,text,ts:Date.now()};
  tickets[i].messages.push(msg);
  if(CU.role==='admin'){tickets[i].hasAdminReply=true;}
  saveTickets(tickets);
  logActivity(`${CU.name||CU.username} ตอบกลับ ticket: ${tickets[i].subj}`);
  inp.value='';
  openTicket(activeTicketId);
  renderInbox();
  updateInboxBadge();
}

function updateInboxBadge(){
  // For regular users: count tickets with unread admin replies
  if(CU.role==='admin')return;
  const myTickets=getTickets().filter(t=>t.uid===CU.id);
  const unread=myTickets.filter(t=>(t.messages||[]).some(m=>m.role==='admin'&&!m.readByUser)).length;
  const ib=document.getElementById('inbox-badge');
  if(ib){ib.style.display=unread?'inline':'none';ib.textContent=unread;}
}

function fmtDateTime(ts){
  if(!ts)return'-';
  const d=new Date(ts);
  return`${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

async function exportImage(mode){
  const el=document.getElementById('tt-wrap');
  if(!el||!el.querySelector('table')){alert('กรุณาเปิดหน้าตารางก่อน');return;}
  const previewArea=document.getElementById('export-preview-area');
  previewArea.innerHTML='<p style="font-size:13px;color:var(--text-s);">⏳ กำลังสร้างภาพ...</p>';
  try{
    const canvas=await html2canvas(el,{scale:3,useCORS:true,backgroundColor:'#ffffff'});
    if(mode==='share'){
      const url=window.location.href;
      navigator.clipboard?.writeText(url).then(()=>alert('คัดลอก URL แล้ว! แชร์ให้เพื่อนได้เลย\n'+url)).catch(()=>prompt('คัดลอก URL นี้:',url));
      previewArea.innerHTML='';return;
    }
    // Create final canvas with desired dimensions
    const out=document.createElement('canvas');
    const ctx=out.getContext('2d');
    if(mode==='wallpaper-mobile'){out.width=1080;out.height=1920;}
    else if(mode==='wallpaper-desktop'){out.width=1920;out.height=1080;}
    else{out.width=canvas.width;out.height=canvas.height;}
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,out.width,out.height);
    // Scale and center
    const scale=Math.min(out.width/canvas.width,out.height/canvas.height)*0.9;
    const x=(out.width-canvas.width*scale)/2;
    const y=(out.height-canvas.height*scale)/2;
    ctx.drawImage(canvas,x,y,canvas.width*scale,canvas.height*scale);
    const link=document.createElement('a');
    link.download=`timetable-${mode}-${CU.username}.png`;
    link.href=out.toDataURL('image/png');
    link.click();
    // Show preview
    previewArea.innerHTML=`<img src="${out.toDataURL('image/png')}" class="export-preview" style="max-height:200px;object-fit:contain;">
      <p style="font-size:11px;color:var(--text-s);margin-top:6px;text-align:center;">✅ ดาวน์โหลดสำเร็จ!</p>`;
  }catch(e){previewArea.innerHTML=`<div class="msg msg-err">เกิดข้อผิดพลาด: ${e.message}</div>`;}
}

function renderReminderPreview(){
  const s=getReminderSettings();
  const cfg=getUserSettings();
  const preview=document.getElementById('reminder-preview');
  if(!preview)return;
  const notifEnabled=document.getElementById('notif-enabled');
  if(notifEnabled)notifEnabled.checked=s.enabled;
  const minSel=document.getElementById('notif-minutes');
  if(minSel)minSel.value=s.minutes;
  // Show upcoming classes today
  const today=new Date().getDay(); // 0=sun,1=mon
  const dayIdx=today-1; // 0=mon
  if(dayIdx<0||dayIdx>=cfg.days.length){preview.innerHTML='<p style="font-size:12px;color:var(--text-t);">วันนี้ไม่มีคลาส</p>';return;}
  const slots=ls('tt_slots_'+CU.id+'_'+activeTTId)||{};
  const subjects=getUserSubjects();
  const now=new Date();
  let upcoming=[];
  cfg.periods.filter(p=>!p.b).forEach(p=>{
    const subj=slots[`${dayIdx}_${p.id}`];
    if(!subj)return;
    const [h,m]=p.s.split(':').map(Number);
    const classTime=new Date();classTime.setHours(h,m,0,0);
    const diff=(classTime-now)/60000;
    if(diff>0&&diff<=120)upcoming.push({p,subj:subjects.find(x=>x.id===subj),diff:Math.round(diff)});
  });
  preview.innerHTML=upcoming.length?`<div style="font-size:12px;font-weight:700;color:var(--text-s);margin-bottom:6px;">📅 คาบที่กำลังจะมาถึงวันนี้:</div>`+upcoming.map(({p,subj,diff})=>`<div style="background:var(--accent-soft);border-radius:8px;padding:8px 10px;margin-bottom:4px;font-size:12px;"><b>${subj?.name||'?'}</b> — ${p.s} <span style="color:var(--accent);">(อีก ${diff} นาที)</span></div>`).join(''):'<p style="font-size:12px;color:var(--text-t);">ไม่มีคาบเรียนใน 2 ชั่วโมงข้างหน้า</p>';
}
function testReminder(){
  if(Notification.permission!=='granted'){alert('กรุณาเปิดอนุญาตการแจ้งเตือนก่อน');return;}
  new Notification('🐱 ทดสอบการแจ้งเตือน',{body:'แจ้งเตือนก่อนเรียน 10 นาที — คณิตศาสตร์ ห้อง 301',tag:'test-reminder'});
}
function startReminderCheck(){
  stopReminderCheck();
  reminderInterval=setInterval(checkReminders,30000);
  checkReminders();
}
function stopReminderCheck(){if(reminderInterval){clearInterval(reminderInterval);reminderInterval=null;}}
function checkReminders(){
  const s=getReminderSettings();
  if(!s.enabled||Notification.permission!=='granted')return;
  if(!activeTTId)return;
  const cfg=getUserSettings();
  const slots=ls('tt_slots_'+CU.id+'_'+activeTTId)||{};
  const subjects=getUserSubjects();
  const now=new Date();
  const dayIdx=now.getDay()-1;
  if(dayIdx<0||dayIdx>=cfg.days.length)return;
  cfg.periods.filter(p=>!p.b).forEach(p=>{
    const subj=slots[`${dayIdx}_${p.id}`];if(!subj)return;
    const [h,m]=p.s.split(':').map(Number);
    const classTime=new Date();classTime.setHours(h,m,0,0);
    const diff=(classTime-now)/60000;
    if(diff>0&&diff<=s.minutes&&diff>s.minutes-1){
      const subjData=subjects.find(x=>x.id===subj);
      const key=`reminded_${p.id}_${now.toDateString()}`;
      if(ls(key))return;
      ss(key,true);
      new Notification(`🔔 อีก ${s.minutes} นาที — ${subjData?.name||'คาบเรียน'}`,{
        body:`📍 ห้อง ${subjData?.room||'?'}  👨‍🏫 ${subjData?.teacher||'?'}  ⏰ ${p.s}`,
        tag:`class-${p.id}-${now.toDateString()}`
      });
    }
  });
}

function validateField(inputId, check, errMsg){
  const el=document.getElementById(inputId);
  if(!el)return true;
  const msgEl=el.parentElement?.querySelector('.field-error-msg');
  const valid=check(el.value);
  el.classList.toggle('field-error',!valid);
  el.classList.toggle('field-ok',valid&&el.value.length>0);
  if(msgEl){msgEl.textContent=errMsg;msgEl.classList.toggle('show',!valid&&el.value.length>0);}
  return valid||el.value.length===0;
}
function attachRegisterValidation(){
  const rules=[
    ['r-user', v=>v.length>=3, 'ชื่อผู้ใช้ต้องมีอย่างน้อย 3 ตัวอักษร'],
    ['r-email', v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), 'รูปแบบอีเมลไม่ถูกต้อง'],
    ['r-pw', v=>/^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(v), 'ต้องมีตัวอักษรและตัวเลข อย่างน้อย 8 ตัว'],
    ['r-name', v=>v.trim().length>=2, 'กรุณากรอกชื่อ'],
    ['r-school', v=>v.trim().length>=2, 'กรุณากรอกชื่อโรงเรียน'],
    ['r-grade', v=>v.trim().length>=1, 'กรุณากรอกชั้นเรียน'],
  ];
  rules.forEach(([id,check,msg])=>{
    const el=document.getElementById(id);
    if(el){
      el.addEventListener('blur',()=>validateField(id,check,msg));
      el.addEventListener('input',()=>validateField(id,check,msg));
    }
  });
  // Password strength meter
  const pwEl=document.getElementById('r-pw');
  if(pwEl){
    pwEl.addEventListener('input',()=>{
      const pw=pwEl.value;
      const hint=document.getElementById('r-pw-strength');
      if(!hint||!pw){if(hint)hint.innerHTML='';return;}
      let score=0;
      if(pw.length>=8)score++;
      if(/[A-Z]/.test(pw))score++;
      if(/[0-9]/.test(pw))score++;
      if(/[^A-Za-z0-9]/.test(pw))score++;
      if(/[a-z]/.test(pw))score++;
      const levels=[
        {label:'อ่อนมาก 😰',color:'#E74C3C'},
        {label:'อ่อน 😟',color:'#E67E22'},
        {label:'พอใช้ 😐',color:'#F1C40F'},
        {label:'ดี 😊',color:'#2ECC71'},
        {label:'แข็งแรงมาก 💪',color:'#27AE60'},
      ];
      const lv=levels[Math.min(score,4)];
      const bar=Math.round((score/5)*100);
      hint.innerHTML=`<div style="display:flex;align-items:center;gap:6px;">
        <div style="flex:1;height:4px;background:#EEE;border-radius:4px;overflow:hidden;">
          <div style="width:${bar}%;height:100%;background:${lv.color};transition:width .3s;border-radius:4px;"></div>
        </div>
        <span style="color:${lv.color};font-weight:700;font-size:11px;">${lv.label}</span>
      </div>`;
    });
  }
}

function showToast(msg, type='info', duration=3000){
  const container = document.getElementById('toast-container');
  if(!container) return;
  const icons = {success:'✅', error:'❌', warn:'⚠️', info:'💬'};
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'💬'}</span><span style="flex:1;">${msg}</span>`;
  el.onclick = () => dismissToast(el);
  container.appendChild(el);
  if(duration > 0) setTimeout(() => dismissToast(el), duration);
  return el;
}
function dismissToast(el){
  if(!el || el.classList.contains('toast-hiding')) return;
  el.classList.add('toast-hiding');
  setTimeout(() => el.remove(), 280);
}

// Button with loading state helper
function btnLoading(btn, loadingText='กำลังบันทึก...'){
  if(!btn) return;
  btn._origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = loadingText;
  btn.classList.add('btn-saving');
}
function btnDone(btn, successText='✅ บันทึกแล้ว', revertMs=1800){
  if(!btn) return;
  btn.disabled = false;
  btn.textContent = successText;
  btn.classList.remove('btn-saving');
  btn.classList.add('btn-saved');
  setTimeout(() => {
    btn.textContent = btn._origText || successText;
    btn.classList.remove('btn-saved');
  }, revertMs);
}
function btnError(btn){
  if(!btn) return;
  btn.disabled = false;
  btn.textContent = btn._origText || 'ลองใหม่';
  btn.classList.remove('btn-saving','btn-saved');
  showToast('เกิดข้อผิดพลาด กรุณาลองใหม่', 'error');
}

  let items = getUserHW();

  const HW_PRIORITY = {high:'🔴', normal:'🟡', low:'🟢'};
  list.innerHTML = items.map(h => {
    const overdue = h.due && !h.done && h.due < today;
    return `<div class="hw-item${h.done?' done':''}">
      <div class="hw-check${h.done?' checked':''}" onclick="toggleHW('${h.id}')">${h.done?'✓':''}</div>
      <div style="flex:1;">
        <div class="hw-text">${HW_PRIORITY[h.priority]||'🟡'} ${escH(h.title)}
          <span class="hw-badge" style="background:${h.type==='exam'?'#FFE5CC':h.type==='project'?'#E5F0FF':'#F0FFE5'};color:var(--text-s);">${HW_TYPES[h.type]||'📌'}</span>

// UX v2 — ONBOARDING FLOW
// ===================================================
const ONBOARD_STEPS = [
  { art:'🐱', title:'ยินดีต้อนรับสู่ ClassMeow!', body:'แอปจัดการตารางเรียน การบ้าน และปฏิทินส่วนตัว — ทำงานได้แม้ออฟไลน์ 📡' },
  { art:'📅', title:'สร้างตารางเรียน', body:'ไปที่ "ตารางเรียน" แล้วกด "+ ใหม่" เพื่อสร้างตาราง จากนั้นสร้างวิชาและลากมาวางในช่องคาบได้เลย 🎯' },
  { art:'📝', title:'ติดตามการบ้าน', body:'หน้า "การบ้าน" ช่วยติดตามงานที่ต้องส่ง แจ้งเตือนเมื่อใกล้เลยกำหนด ✅' },
  { art:'🎨', title:'เลือกธีมที่ชอบ!', body:'มีธีม 9 แบบ แมว 🐱 หมา 🐶 และคาปิบาร่า 🌾 กด 🎨 ที่มุมขวาบนเพื่อเปลี่ยนธีมได้เลย' },
];
let _obStep = 0;

function startOnboarding(){
  _obStep = 0;
  document.getElementById('onboarding-overlay').classList.remove('hidden');
  renderOnboardStep();
}
function renderOnboardStep(){
  const step = ONBOARD_STEPS[_obStep];
  document.getElementById('ob-art').textContent = step.art;
  document.getElementById('ob-title').textContent = step.title;
  document.getElementById('ob-body').textContent = step.body;
  document.getElementById('ob-num').textContent = `ขั้นที่ ${_obStep+1}/${ONBOARD_STEPS.length}`;
  document.getElementById('ob-progress').style.width = `${((_obStep+1)/ONBOARD_STEPS.length)*100}%`;
  // Dots
  document.getElementById('ob-dots').innerHTML = ONBOARD_STEPS.map((_,i)=>`<div class="onboard-dot${i===_obStep?' active':''}"></div>`).join('');
  // Next button text
  const nextBtn = document.getElementById('ob-next');
  if(nextBtn) nextBtn.textContent = _obStep === ONBOARD_STEPS.length-1 ? '🚀 เริ่มใช้งาน!' : 'ถัดไป →';
}
function nextOnboardStep(){
  if(_obStep < ONBOARD_STEPS.length-1){ _obStep++; renderOnboardStep(); }
  else finishOnboarding();
}
function finishOnboarding(){
  document.getElementById('onboarding-overlay').classList.add('hidden');
  localStorage.setItem('cm_onboarded', '1');
  showToast('🎉 ยินดีต้อนรับสู่ ClassMeow! เริ่มสร้างตารางเรียนได้เลย', 'success', 4000);
}
function checkOnboarding(){
  if(!localStorage.getItem('cm_onboarded')) setTimeout(startOnboarding, 800);
}

const _origGoPage_ux = goPage;
function goPage(p){
  if((p==='admin'||p==='admin-tt')&&(!CU||CU.role!=='admin')){console.warn('SEC: unauthorized');return;}
  document.querySelectorAll('[id^="page-"]').forEach(el=>el.classList.add('hidden'));
  const pageEl = document.getElementById('page-'+p);
  if(pageEl) pageEl.classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-p="${p}"]`)?.classList.add('active');
  currentPage = p;
  // Add breadcrumb to page
  if(pageEl){
    const existingBC = pageEl.querySelector('.breadcrumb');
    if(!existingBC){
      const bc = document.createElement('div');
      bc.innerHTML = renderBreadcrumb(p);
      pageEl.prepend(bc.firstChild);
    }
  }
  // Dispatch to render functions
  if(p==='dashboard') renderDashboard();
  if(p==='timetable') renderTTPage();
  if(p==='profile') renderProfile();
  if(p==='settings') renderSettings();
  if(p==='admin'&&CU.role==='admin'){renderAdmin();adminTab('overview');}
  if(p==='admin-tt'&&CU.role==='admin') renderAdminTTStandalone();
  if(p==='calendar') renderCalendar();
  if(p==='homework') renderHWList();
  if(p==='reminders'){updateNotifStatus();renderReminderPreview();}
  if(p==='inbox'){renderInbox();updateInboxBadge();}
  closeSidebar();
}

     ClassMeow Features Module (SW + Push + OAuth + ICS)
     โหลดหลัง main script เสมอ
     ============================================================ -->
<script>
// ── Google OAuth stub (works with localStorage version) ──

// ── .ics Export (wire to features module) ──
function exportToCalendar(){
  if(typeof window.ClassMeowFeatures !== 'undefined'){
    window.ClassMeowFeatures.exportToCalendar();
    return;
  }
  // Inline fallback for localStorage version
  if(!activeTTId){ showToast('กรุณาเลือกตารางก่อน','warn'); return; }
  const slots=getSlots(activeTTId);
  if(!Object.keys(slots).length){ showToast('ตารางว่างเปล่า ยังไม่มีวิชา','warn'); return; }
  const cfg=getUserSettings();
  const subjects=getUserSubjects();
  const dayOffsets={'วันจันทร์':0,'วันอังคาร':1,'วันพุธ':2,'วันพฤหัสบดี':3,'วันศุกร์':4,'วันเสาร์':5,'วันอาทิตย์':6};
  const rruleDays=['MO','TU','WE','TH','FR','SA','SU'];
  const monday=new Date(); monday.setDate(monday.getDate()-monday.getDay()+1); monday.setHours(0,0,0,0);
  const pad=n=>String(n).padStart(2,'0');
  const fmtICS=d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  const esc=s=>String(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  const now=fmtICS(new Date());
  let lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//ClassMeow//TH','CALSCALE:GREGORIAN',
    'METHOD:PUBLISH','X-WR-CALNAME:ClassMeow ตารางเรียน',
    'BEGIN:VTIMEZONE','TZID:Asia/Bangkok','BEGIN:STANDARD',
    'DTSTART:19700101T000000','TZOFFSETFROM:+0700','TZOFFSETTO:+0700','TZNAME:ICT',
    'END:STANDARD','END:VTIMEZONE'];
  Object.entries(slots).forEach(([key,subjId])=>{
    const[dayIdxStr,periodId]=key.split('_');
    const di=parseInt(dayIdxStr);
    const dayName=cfg.days[di];
    const period=cfg.periods.find(p=>p.id===periodId);
    const subj=subjects.find(s=>s.id===subjId);
    if(!dayName||!period||!subj||period.b)return;
    const offset=dayOffsets[dayName]??di;
    const[sh,sm]=period.s.split(':').map(Number);
    const[eh,em]=period.e.split(':').map(Number);
    const sd=new Date(monday); sd.setDate(monday.getDate()+offset); sd.setHours(sh,sm,0,0);
    const ed=new Date(sd); ed.setHours(eh,em,0,0);
    lines.push('BEGIN:VEVENT',
      `UID:${key}-${subjId}@classmeow`,`DTSTAMP:${now}`,
      `DTSTART;TZID=Asia/Bangkok:${fmtICS(sd)}`,
      `DTEND;TZID=Asia/Bangkok:${fmtICS(ed)}`,
      `SUMMARY:${esc((subj.ico||'📚')+' '+subj.name)}`,
      subj.room?`LOCATION:${esc('ห้อง '+subj.room)}`:'',
      `DESCRIPTION:${esc([subj.code?'รหัส: '+subj.code:'',subj.teacher?'ครู: '+subj.teacher:''].filter(Boolean).join('\\n'))}`,
      `RRULE:FREQ=WEEKLY;BYDAY=${rruleDays[offset]||'MO'}`,
      'STATUS:CONFIRMED','END:VEVENT'
    ).filter(Boolean);
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='classmeow-timetable.ics'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast('📅 Export .ics สำเร็จ! เปิดไฟล์เพื่อ import เข้า Google Calendar','success',5000);
}

// ── Service Worker Registration ──
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('classmeow-sw.js',{scope:'/',updateViaCache:'none'})
      .then(reg=>{
        console.log('[ClassMeow] SW registered ✅');
        // Listen for SW messages
        navigator.serviceWorker.addEventListener('message', ev=>{
          const{type,url}=ev.data||{};
          if(type==='NOTIFICATION_CLICK'&&url){
            const p=new URL(url,window.location).searchParams.get('page');
            if(p&&typeof goPage==='function'&&CU) goPage(p);
          }
        });
        // Handle URL deep link from notification
        const urlPage=new URLSearchParams(window.location.search).get('page');
        if(urlPage){
          const wait=setInterval(()=>{
            if(typeof goPage==='function'&&typeof CU!=='undefined'&&CU){
              clearInterval(wait); goPage(urlPage);
            }
          },300);
          setTimeout(()=>clearInterval(wait),6000);
        }
      })
      .catch(err=>console.warn('[ClassMeow] SW failed:',err));
  });
}

// ── PWA Install Prompt ──
let _deferredInstall=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); _deferredInstall=e;
  setTimeout(()=>{
    if(!_deferredInstall||localStorage.getItem('cm_install_dismissed'))return;
    const t=showToast('📲 ติดตั้ง ClassMeow เป็นแอปบนอุปกรณ์ของคุณ','info',0);
    if(!t)return;
    const btn=document.createElement('button');
    btn.textContent='ติดตั้ง';
    btn.style.cssText='margin-left:8px;padding:4px 12px;border-radius:6px;border:none;background:rgba(255,255,255,.25);color:#fff;font-weight:700;cursor:pointer;font-family:Sarabun,sans-serif;font-size:12px;';
    btn.onclick=async()=>{
      _deferredInstall.prompt();
      const{outcome}=await _deferredInstall.userChoice;
      if(outcome==='accepted') showToast('🎉 ติดตั้ง ClassMeow สำเร็จ!','success');
      _deferredInstall=null; t.remove();
    };
    const dis=document.createElement('button');
    dis.textContent='✕';
    dis.style.cssText='margin-left:4px;padding:4px 8px;border-radius:6px;border:none;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;';
    dis.onclick=()=>{localStorage.setItem('cm_install_dismissed','1');t.remove();};
    t.appendChild(btn); t.appendChild(dis);
  },20000);
});
window.addEventListener('appinstalled',()=>showToast('🎉 ClassMeow ติดตั้งสำเร็จ!','success'));

// ── Improved Push Notification using SW ──
async function requestNotifPermission(){
  if(!('Notification' in window)){showToast('เบราว์เซอร์นี้ไม่รองรับ','warn');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    // Try subscribe via SW for background notifications
    if('serviceWorker' in navigator && 'PushManager' in window){
      try{
        const reg=await navigator.serviceWorker.ready;
        // Schedule today's classes
        scheduleAllClassReminders();
      }catch(e){console.warn('Push subscribe:',e);}
    }
    document.getElementById('notif-permission-card').style.display='none';
    document.getElementById('notif-enabled').checked=true;
    saveReminderSettings();
    new Notification('🐱 ClassMeow',{body:'เปิดการแจ้งเตือนสำเร็จ! ระบบจะแจ้งก่อนเรียนตามเวลาที่เลือก'});
    updateNotifStatus();
  } else {
    showToast('ไม่ได้รับอนุญาต — กรุณาเปิดใน Settings ของเบราว์เซอร์','warn');
  }
}

// Schedule all class reminders for today via SW
async function scheduleAllClassReminders(){
  const s=getReminderSettings();
  if(!s.enabled||!activeTTId)return;
  const cfg=getUserSettings();
  const slots=getUserSettings?getSlots(activeTTId):{};
  const subjects=getUserSubjects();
  const now=new Date();
  const dayIdx=now.getDay()-1; // 0=Mon
  if(dayIdx<0||dayIdx>=cfg.days.length)return;
  if(!('serviceWorker' in navigator))return;
  const reg=await navigator.serviceWorker.ready;
  cfg.periods.filter(p=>!p.b).forEach(p=>{
    const subjId=slots[`${dayIdx}_${p.id}`]; if(!subjId)return;
    const subj=subjects.find(x=>x.id===subjId); if(!subj)return;
    const[h,m]=p.s.split(':').map(Number);
    const classTime=new Date(); classTime.setHours(h,m,0,0);
    const delayMs=classTime-now-(s.minutes*60000);
    if(delayMs<=0)return;
    // Send schedule to SW
    reg.active?.postMessage({
      type:'SCHEDULE_NOTIFICATION',
      payload:{
        id:`${dayIdx}_${p.id}`,
        title:`🔔 ${subj.name} เริ่มใน ${s.minutes} นาที`,
        body:`📍 ${subj.room?'ห้อง '+subj.room:''} ${subj.teacher?'👨‍🏫'+subj.teacher:''}`.trim(),
        delayMs,
        tag:`class-${p.id}-${now.toDateString()}`
      }
    });
  });
}
