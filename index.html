<style>
/* ===== THEME VARIABLES ===== */
:root {
  --bg:#FDF5FF; --card:#FFFFFF; --border:#EDD5F5;
  --p1:#C4A8E8; --p2:#F4A0B5; --p3:#8ADCB8;
  --text:#3D2250; --text-s:#8A6A9A; --text-t:#BBA0CC;
  --shadow:rgba(160,100,200,0.10);
  --radius:14px; --radius-s:8px; --radius-xs:6px;
  --accent:#A07CD0; --accent-soft:#EDD5F5;
  --success:#2ECC71; --warn:#F39C12; --danger:#E74C3C;
  --theme-emoji:🐱;
}
.theme-cat-pink { --bg:#FFF0F5; --border:#FFB3CC; --p1:#FF85A8; --p2:#FFB3CC; --p3:#FFD6E5; --accent:#E5547A; --accent-soft:#FFE0EB; --text:#5C1030; --text-s:#A04060; --theme-emoji:🐱; }
.theme-cat-purple { --bg:#F5F0FF; --border:#C4A8E8; --p1:#9B6DC8; --p2:#C4A8E8; --p3:#E2D4F5; --accent:#7B4DB8; --accent-soft:#E8D8F8; --text:#2E0A5C; --text-s:#6A3A9A; --theme-emoji:🐈; }
.theme-cat-mint { --bg:#F0FFF8; --border:#85DFB8; --p1:#3DB887; --p2:#85DFB8; --p3:#C2F0DB; --accent:#1E9E6B; --accent-soft:#CCEEDD; --text:#0A3C28; --text-s:#2A7A58; --theme-emoji:🐈‍⬛; }
.theme-dog-orange { --bg:#FFF8F0; --border:#FFBB85; --p1:#FF8C35; --p2:#FFBB85; --p3:#FFE0C2; --accent:#E07020; --accent-soft:#FFE8D0; --text:#4A2000; --text-s:#8A4A10; --theme-emoji:🐶; }
.theme-dog-brown { --bg:#FDF5EE; --border:#D4A878; --p1:#A06030; --p2:#D4A878; --p3:#EDD8BE; --accent:#7A4010; --accent-soft:#F0DEC8; --text:#3C1A00; --text-s:#7A4520; --theme-emoji:🐕; }
.theme-dog-sky { --bg:#F0F8FF; --border:#85C4F5; --p1:#3090E0; --p2:#85C4F5; --p3:#C2E4FA; --accent:#1060B0; --accent-soft:#D0E8FA; --text:#0A2A4A; --text-s:#2A60A0; --theme-emoji:🦮; }
.theme-capy-yellow { --bg:#FFFBF0; --border:#DEB887; --p1:#D4A054; --p2:#E8C080; --p3:#F5DFB0; --accent:#A0722A; --accent-soft:#F5E6C8; --text:#3A2800; --text-s:#7A5020; --theme-emoji:🌾; }
.theme-capy-green  { --bg:#F2FBF2; --border:#90C878; --p1:#5AAA40; --p2:#90C878; --p3:#C8E8B8; --accent:#3A8820; --accent-soft:#D0ECC0; --text:#163010; --text-s:#306820; --theme-emoji:🌿; }
.theme-capy-brown  { --bg:#FAF3EC; --border:#C49A6C; --p1:#9E6A38; --p2:#C49A6C; --p3:#E6CAA0; --accent:#7A4E20; --accent-soft:#EEE0CC; --text:#3A1E08; --text-s:#7A4E20; --theme-emoji:🍂; }

* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .3s,color .3s; }
a { color:var(--accent); text-decoration:none; }

/* ===== TYPOGRAPHY ===== */
h1{font-size:22px;font-weight:700} h2{font-size:18px;font-weight:700} h3{font-size:15px;font-weight:700}
p{line-height:1.6} .text-s{color:var(--text-s)} .text-muted{color:var(--text-t)}

/* ===== LAYOUT ===== */
#auth-screen { display:flex; min-height:100vh; align-items:center; justify-content:center; padding:20px; background:linear-gradient(135deg,var(--bg) 0%,var(--accent-soft) 100%); }
#main-screen { display:none; flex-direction:column; min-height:100vh; }
.topbar { background:var(--card); border-bottom:1px solid var(--border); padding:0 20px; display:flex; align-items:center; gap:12px; height:56px; position:sticky; top:0; z-index:200; box-shadow:0 2px 12px var(--shadow); }
.topbar-logo { font-size:17px; font-weight:700; color:var(--accent); flex:1; display:flex; align-items:center; gap:6px; }
.theme-indicator { font-size:22px; }
.body-wrap { display:flex; flex:1; overflow:hidden; min-height:calc(100vh - 56px); }
.sidebar { width:230px; background:var(--card); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; transition:transform .3s; }
.main-content { flex:1; overflow-y:auto; overflow-x:hidden; background:var(--bg); }
.content-pad { padding:24px; max-width:1400px; }

/* ===== SIDEBAR ===== */
.sidebar-header { padding:16px; border-bottom:1px solid var(--border); }
.user-mini { display:flex; align-items:center; gap:10px; }
.avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--p1),var(--p2)); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:#fff; flex-shrink:0; }
.user-mini-name { font-size:13px; font-weight:600; color:var(--text); }
.user-mini-role { font-size:11px; color:var(--text-s); }
.nav-section { padding:12px 10px; }
.nav-section-title { font-size:11px; font-weight:700; color:var(--text-t); text-transform:uppercase; letter-spacing:0.8px; padding:4px 8px 8px; }
.nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; border-radius:10px; font-size:13.5px; font-weight:500; color:var(--text-s); cursor:pointer; transition:all .15s; margin-bottom:2px; }
.nav-item:hover { background:var(--accent-soft); color:var(--accent); }
.nav-item.active { background:var(--accent-soft); color:var(--accent); font-weight:700; }
.nav-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.nav-badge { margin-left:auto; background:var(--danger); color:#fff; border-radius:20px; padding:1px 7px; font-size:11px; font-weight:700; }

/* ===== BUTTONS ===== */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 18px; border:none; border-radius:10px; font-family:'Sarabun',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all .18s; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary { background:linear-gradient(135deg,var(--p1),var(--p2)); color:#fff; }
.btn-primary:hover:not(:disabled) { opacity:.9; transform:translateY(-1px); box-shadow:0 4px 12px var(--shadow); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover:not(:disabled) { opacity:.9; }
.btn-ghost { background:transparent; color:var(--text-s); border:1.5px solid var(--border); }
.btn-ghost:hover { background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
.btn-sm { padding:6px 12px; font-size:12px; border-radius:8px; }
.btn-xs { padding:4px 9px; font-size:11px; border-radius:6px; }
.btn-danger { background:#FFE5E5; color:var(--danger); }
.btn-danger:hover { background:#FFCCCC; }
.btn-success { background:#E5FFF0; color:var(--success); }
.btn-full { width:100%; }
.btn-icon { width:32px; height:32px; padding:0; border-radius:8px; }

/* ===== FORMS ===== */
.form-group { margin-bottom:13px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
label { display:block; font-size:12px; font-weight:600; color:var(--text-s); margin-bottom:5px; }
input,select,textarea { width:100%; padding:9px 13px; border:1.5px solid var(--border); border-radius:9px; font-family:'Sarabun',sans-serif; font-size:13px; color:var(--text); background:#FDFAFF; transition:border .2s; outline:none; }
input:focus,select:focus,textarea:focus { border-color:var(--accent); background:#fff; }
textarea { resize:vertical; min-height:80px; }
.form-hint { font-size:11px; color:var(--text-s); margin-top:3px; }
.msg { padding:9px 13px; border-radius:9px; font-size:13px; margin-bottom:12px; }
.msg-err { background:#FFE5E5; color:var(--danger); }
.msg-ok { background:#E5FFF0; color:var(--success); }
.msg-warn { background:#FFF5E5; color:var(--warn); }

/* ===== CARDS ===== */
.card { background:var(--card); border-radius:var(--radius); box-shadow:0 2px 16px var(--shadow); padding:20px; border:1px solid var(--border); }
.card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.card-title { font-size:15px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:7px; }

/* ===== DASHBOARD ===== */
.dash-hero { background:linear-gradient(135deg,var(--p1) 0%,var(--p2) 60%,var(--p3) 100%); border-radius:20px; padding:28px 32px; color:#fff; margin-bottom:20px; position:relative; overflow:hidden; }
.dash-hero h2 { font-size:22px; font-weight:700; margin-bottom:4px; }
.dash-hero p { font-size:14px; opacity:.85; }
.dash-hero-emoji { position:absolute; right:24px; top:50%; transform:translateY(-50%); font-size:72px; opacity:.3; }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); box-shadow:0 2px 8px var(--shadow); }
.stat-num { font-size:26px; font-weight:700; color:var(--accent); }
.stat-label { font-size:12px; color:var(--text-s); margin-top:2px; }
.quick-actions { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:20px; }
.qa-btn { background:var(--card); border-radius:14px; border:1.5px solid var(--border); padding:16px 12px; text-align:center; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; align-items:center; gap:6px; }
.qa-btn:hover { border-color:var(--accent); background:var(--accent-soft); transform:translateY(-2px); box-shadow:0 4px 16px var(--shadow); }
.qa-icon { font-size:26px; }
.qa-label { font-size:12px; font-weight:600; color:var(--text-s); }
.tt-list-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
.tt-list-card { background:var(--card); border-radius:14px; border:1.5px solid var(--border); padding:18px; cursor:pointer; transition:all .2s; }
.tt-list-card:hover { border-color:var(--accent); box-shadow:0 4px 20px var(--shadow); transform:translateY(-2px); }
.tt-list-card.active-card { border-color:var(--accent); background:var(--accent-soft); }
.tt-card-icon { font-size:36px; margin-bottom:8px; }
.tt-card-name { font-size:15px; font-weight:700; color:var(--text); }
.tt-card-meta { font-size:12px; color:var(--text-s); margin-top:4px; }
.tt-card-add { border-style:dashed; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--text-s); min-height:120px; }
.tt-card-add:hover { background:var(--accent-soft); color:var(--accent); border-color:var(--accent); }
.tt-add-icon { font-size:32px; }

/* ===== TIMETABLE ===== */
.tt-page-header { display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
.tt-page-header h2 { flex:1; }
.timetable-layout { display:flex; gap:16px; }
.timetable-main { flex:1; min-width:0; overflow-x:auto; }
.timetable-sidebar { width:220px; flex-shrink:0; }
table.timetable { border-collapse:separate; border-spacing:3px; min-width:680px; width:100%; }
table.timetable th { background:linear-gradient(135deg,var(--p1),var(--p2)); color:#fff; font-size:11.5px; font-weight:700; padding:7px 5px; border-radius:8px; text-align:center; white-space:nowrap; }
.th-period-time { font-size:10px; font-weight:400; display:block; opacity:.8; margin-top:1px; }
.th-day { min-width:78px; cursor:pointer; }
.th-day:hover { opacity:.85; }
.tt-cell { height:62px; min-width:82px; border-radius:8px; background:var(--card); border:1.5px dashed var(--border); vertical-align:middle; transition:all .15s; position:relative; }
.tt-cell.drag-over { background:var(--accent-soft); border:2px solid var(--accent); border-style:solid; }
.tt-cell.has-subj { border-style:solid; border-color:transparent; }
.tt-cell.break-cell { background:linear-gradient(135deg,#FFFDE7,#FFF9C4); border-color:#FFD700; border-style:solid; }
.break-inner { display:flex; align-items:center; justify-content:center; height:100%; font-size:12px; color:#B8860B; font-weight:600; gap:4px; }
.cell-content { width:100%; height:100%; border-radius:6px; padding:4px 6px; display:flex; flex-direction:column; justify-content:center; cursor:grab; position:relative; }
.cell-content:active { cursor:grabbing; }
.cell-content:hover .cell-del-btn { display:flex; }
.cell-icon { font-size:14px; position:absolute; top:3px; left:5px; }
.cell-code { font-size:10px; font-weight:700; opacity:.7; padding-left:18px; }
.cell-name { font-size:12px; font-weight:700; line-height:1.2; }
.cell-room-info { font-size:10px; opacity:.65; }
.cell-del-btn { display:none; position:absolute; top:2px; right:2px; width:16px; height:16px; border-radius:50%; background:rgba(255,255,255,.9); border:none; font-size:9px; cursor:pointer; align-items:center; justify-content:center; color:var(--danger); font-weight:700; z-index:2; }

/* Subject cards in sidebar */
.subj-panel-title { font-size:12px; font-weight:700; color:var(--text-s); text-transform:uppercase; letter-spacing:.7px; margin-bottom:8px; }
.subj-card { border-radius:10px; padding:9px 11px; cursor:grab; border:1.5px solid transparent; transition:all .18s; user-select:none; margin-bottom:6px; position:relative; }
.subj-card:hover { transform:translateY(-1px); box-shadow:0 4px 12px var(--shadow); }
.subj-card.dragging { opacity:.4; }
.subj-card-icon { font-size:15px; }
.subj-card-code { font-size:10px; font-weight:700; opacity:.7; }
.subj-card-name { font-size:12px; font-weight:700; margin-top:1px; }
.subj-card-sub { font-size:10px; opacity:.65; margin-top:1px; }
.subj-card-actions { display:flex; gap:3px; margin-top:6px; flex-wrap:wrap; }
.subj-card-btn { padding:2px 7px; border-radius:5px; border:none; font-family:'Sarabun',sans-serif; font-size:10px; font-weight:600; cursor:pointer; background:rgba(255,255,255,.6); transition:background .15s; }
.subj-card-btn:hover { background:rgba(255,255,255,.9); }

/* ===== MODALS ===== */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(40,10,60,.4); z-index:1000; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(3px); }
.modal-bg.open { display:flex; }
.modal { background:var(--card); border-radius:20px; padding:26px; width:100%; max-width:460px; box-shadow:0 16px 60px rgba(80,20,120,.2); max-height:92vh; overflow-y:auto; }
.modal.modal-lg { max-width:620px; }
.modal h3 { font-size:16px; font-weight:700; color:var(--accent); margin-bottom:18px; }
.modal-actions { display:flex; gap:8px; margin-top:18px; }
.modal-actions .btn { flex:1; }
.color-grid { display:flex; gap:6px; flex-wrap:wrap; margin-top:5px; }
.color-swatch { width:28px; height:28px; border-radius:7px; border:2px solid transparent; cursor:pointer; transition:transform .15s; }
.color-swatch:hover,.color-swatch.sel { transform:scale(1.2); border-color:var(--text); }
.icon-grid { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
.icon-opt { width:34px; height:34px; border-radius:8px; border:2px solid var(--border); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:all .15s; background:var(--bg); }
.icon-opt:hover,.icon-opt.sel { border-color:var(--accent); background:var(--accent-soft); transform:scale(1.1); }
.theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:8px; }
.theme-card { border-radius:12px; border:2px solid var(--border); padding:12px; text-align:center; cursor:pointer; transition:all .2s; background:var(--card); }
.theme-card:hover,.theme-card.sel { border-color:var(--accent); box-shadow:0 3px 12px var(--shadow); }
.theme-card-icon { font-size:28px; margin-bottom:4px; }
.theme-card-name { font-size:12px; font-weight:600; color:var(--text-s); }

/* ===== ADMIN ===== */
.admin-stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:20px; }
.admin-stat { background:var(--card); border-radius:12px; padding:16px 20px; border:1px solid var(--border); }
.admin-stat-num { font-size:30px; font-weight:700; color:var(--accent); }
.admin-stat-label { font-size:12px; color:var(--text-s); }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { background:var(--accent-soft); color:var(--accent); padding:10px 12px; font-size:12px; font-weight:700; text-align:left; }
.data-table th:first-child { border-radius:8px 0 0 8px; }
.data-table th:last-child { border-radius:0 8px 8px 0; }
.data-table td { padding:9px 12px; font-size:13px; border-bottom:1px solid var(--border); }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:var(--bg); }
.badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-admin { background:var(--accent-soft); color:var(--accent); }
.badge-user { background:#E5FFF0; color:var(--success); }
.badge-warn { background:#FFF5E5; color:var(--warn); }
.ticket-card { border-radius:10px; border:1px solid var(--border); padding:14px; margin-bottom:10px; background:var(--card); }
.ticket-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.ticket-from { font-size:12px; font-weight:700; color:var(--accent); }
.ticket-time { font-size:11px; color:var(--text-t); }
.ticket-msg { font-size:13px; color:var(--text); line-height:1.5; }

/* ===== SETTINGS GAMIFIED ===== */
.period-item {
  background: var(--card); border: 2px solid var(--border); border-radius: 12px;
  padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  cursor: grab; transition: all .2s; user-select: none;
}
.period-item:hover { border-color: var(--accent); box-shadow: 0 3px 12px var(--shadow); }
.period-item.dragging-item { opacity: .4; cursor: grabbing; }
.period-item.drag-target { border-color: var(--accent); border-style: dashed; background: var(--accent-soft); }
.period-item.is-break { background: linear-gradient(135deg,#FFFDE7,#FFF9C4); border-color: #FFD700; }
.period-drag-handle { font-size: 16px; color: var(--text-t); cursor: grab; padding: 2px 4px; }
.period-num-badge { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.period-num-badge.break-badge { background: #FFD700; color: #7A6000; }
.period-inputs { display: flex; gap: 6px; flex: 1; }
.period-inputs input { padding: 5px 8px; font-size: 12px; border-radius: 7px; }
.period-inputs input.time-inp { width: 72px; }
.period-inputs input.label-inp { flex: 1; }
.period-del-btn { width: 26px; height: 26px; border-radius: 8px; border: none; background: #FFE5E5; color: #C0392B; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; }
.period-del-btn:hover { background: #FFCCCC; }
.day-item { background: var(--card); border: 2px solid var(--border); border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: grab; transition: all .2s; }
.day-item:hover { border-color: var(--accent); }
.day-item.dragging-item { opacity: .4; }
.day-item.drag-target { border-color: var(--accent); border-style: dashed; background: var(--accent-soft); }
.day-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
/* Settings preview mini-table */
.preview-table { border-collapse: separate; border-spacing: 2px; width: 100%; font-size: 10px; }
.preview-table th { background: var(--accent); color: #fff; padding: 4px 2px; border-radius: 4px; text-align: center; font-size: 9px; white-space: nowrap; }
.preview-table td { height: 28px; border-radius: 4px; background: var(--card); border: 1px dashed var(--border); text-align: center; vertical-align: middle; }
.preview-table td.break-td { background: #FFFDE7; border-color: #FFD700; font-size: 9px; }
/* Inbox / Chat */
.ticket-item { border-radius: 10px; padding: 10px 12px; cursor: pointer; border: 1.5px solid var(--border); margin-bottom: 7px; transition: all .18s; }
.ticket-item:hover { border-color: var(--accent); background: var(--accent-soft); }
.ticket-item.active-ticket { border-color: var(--accent); background: var(--accent-soft); }
.ticket-item.unread-ticket { border-left: 4px solid var(--accent); }
.ticket-item-title { font-size: 13px; font-weight: 700; color: var(--text); }
.ticket-item-meta { font-size: 11px; color: var(--text-t); margin-top: 2px; }
.ticket-item-preview { font-size: 11px; color: var(--text-s); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* Chat bubbles */
.chat-bubble-wrap { display: flex; flex-direction: column; gap: 2px; }
.chat-bubble-wrap.from-me { align-items: flex-end; }
.chat-bubble-wrap.from-other { align-items: flex-start; }
.chat-bubble { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.from-me .chat-bubble { background: linear-gradient(135deg, var(--p1), var(--p2)); color: #fff; border-bottom-right-radius: 4px; }
.from-other .chat-bubble { background: var(--card); border: 1.5px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
.from-other.admin-bubble .chat-bubble { background: var(--accent-soft); border-color: var(--accent); }
.chat-meta { font-size: 10px; color: var(--text-t); padding: 0 4px; }
.chat-sender { font-size: 11px; font-weight: 700; color: var(--accent); padding: 0 4px 2px; }
/* Status chip */
.status-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.chip-open { background: #FFE5E5; color: #C0392B; }
.chip-resolved { background: #E5FFF0; color: #1E8449; }
/* Responsive settings */
@media(max-width:860px){ #settings-layout{grid-template-columns:1fr;} #inbox-layout{grid-template-columns:1fr;} }
/* Announcement banner */
.announce-bar { background:linear-gradient(135deg,var(--p1),var(--p2)); color:#fff; padding:10px 20px; font-size:13px; font-weight:600; display:none; align-items:center; gap:10px; position:sticky; top:56px; z-index:150; }
.announce-bar.show { display:flex; }
.announce-bar-close { margin-left:auto; background:rgba(255,255,255,.25); border:none; color:#fff; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; }
/* Homework tracker */
.hw-list { display:flex; flex-direction:column; gap:8px; }
.hw-item { background:var(--card); border-radius:10px; border:1.5px solid var(--border); padding:10px 14px; display:flex; align-items:center; gap:10px; transition:all .15s; }
.hw-item.done { opacity:.55; }
.hw-item.done .hw-text { text-decoration:line-through; color:var(--text-t); }
.hw-check { width:18px; height:18px; border-radius:5px; border:2px solid var(--accent); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:transparent; transition:all .15s; }
.hw-check.checked { background:var(--accent); color:#fff; }
.hw-text { font-size:13px; font-weight:600; color:var(--text); flex:1; }
.hw-meta { font-size:11px; color:var(--text-t); white-space:nowrap; }
.hw-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; margin-left:4px; }
/* Admin tickets v2 */
.ticket-card-v2 { border-radius:12px; border:1.5px solid var(--border); padding:14px 16px; margin-bottom:10px; background:var(--card); transition:all .2s; }
.ticket-card-v2:hover { box-shadow:0 4px 16px var(--shadow); border-color:var(--accent); }
.ticket-card-v2.unread { border-left:4px solid var(--accent); }
.ticket-status { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.ticket-open { background:#FFE5E5; color:#C0392B; }
.ticket-resolved { background:#E5FFF0; color:var(--success); }
/* Admin analytics */
.chart-bar-wrap { display:flex; flex-direction:column; gap:6px; }
.chart-bar-row { display:flex; align-items:center; gap:8px; font-size:12px; }
.chart-bar-label { width:80px; text-align:right; color:var(--text-s); font-size:11px; flex-shrink:0; }
.chart-bar-outer { flex:1; background:var(--bg); border-radius:20px; height:18px; overflow:hidden; }
.chart-bar-inner { height:100%; border-radius:20px; background:linear-gradient(90deg,var(--p1),var(--p2)); transition:width .6s ease; }
.chart-bar-val { width:32px; font-size:11px; font-weight:700; color:var(--accent); }
/* User ban status */
.badge-banned { background:#FFE5E5; color:#C0392B; }
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }
.status-active { background:#2ECC71; }
.status-banned { background:#E74C3C; }
/* Form validation */
.form-field-wrap { position:relative; }
input.field-error, select.field-error { border-color:#E74C3C !important; background:#FFF5F5 !important; }
input.field-ok { border-color:#2ECC71 !important; }
.field-error-msg { font-size:11px; color:#E74C3C; margin-top:3px; display:none; }
.field-error-msg.show { display:block; }
/* Reminder bell */
.reminder-badge { position:absolute; top:-4px; right:-4px; width:16px; height:16px; background:var(--danger); border-radius:50%; font-size:9px; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; }
/* Export image preview */
.export-preview { border-radius:12px; overflow:hidden; border:2px solid var(--border); margin-top:12px; max-width:100%; }
/* Quota badge */
.quota-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; background:var(--accent-soft); color:var(--accent); }
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-nav-btn { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--border); background:var(--card); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.cal-nav-btn:hover { background:var(--accent-soft); border-color:var(--accent); }
.cal-month-label { font-size:18px; font-weight:700; color:var(--text); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-name { text-align:center; font-size:11px; font-weight:700; color:var(--text-s); padding:6px 0; }
.cal-cell { min-height:90px; border-radius:10px; border:1.5px solid var(--border); background:var(--card); padding:6px; position:relative; transition:all .15s; }
.cal-cell.other-month { background:var(--bg); opacity:.5; }
.cal-cell.today { border-color:var(--accent); background:var(--accent-soft); }
.cal-cell.drag-over-cal { background:var(--accent-soft); border-color:var(--accent); border-style:dashed; }
.cal-date-num { font-size:12px; font-weight:700; color:var(--text-s); margin-bottom:4px; display:flex; align-items:center; justify-content:space-between; }
.cal-date-num.today-num { color:var(--accent); }
.cal-add-btn { opacity:0; width:18px; height:18px; border-radius:50%; border:none; background:var(--accent); color:#fff; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity .15s; }
.cal-cell:hover .cal-add-btn { opacity:1; }
.cal-notes { display:flex; flex-direction:column; gap:3px; }
.sticky-note { border-radius:7px; padding:5px 7px; font-size:11px; font-weight:600; cursor:grab; position:relative; transition:all .18s; box-shadow:0 2px 6px rgba(0,0,0,.08); line-height:1.3; }
.sticky-note:hover { transform:translateY(-1px) rotate(0.5deg); box-shadow:0 4px 12px rgba(0,0,0,.12); }
.sticky-note:hover .note-actions { opacity:1; }
.sticky-note.dragging { opacity:.4; cursor:grabbing; }
.note-actions { opacity:0; position:absolute; top:2px; right:2px; display:flex; gap:2px; transition:opacity .15s; }
.note-act-btn { width:16px; height:16px; border-radius:4px; border:none; font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.8); }
/* Note panel (right side) */
.note-panel { width:240px; flex-shrink:0; }
.note-panel-title { font-size:12px; font-weight:700; color:var(--text-s); text-transform:uppercase; letter-spacing:.7px; margin-bottom:8px; }
.note-card-list { display:flex; flex-direction:column; gap:6px; }
.note-card { border-radius:10px; padding:10px 12px; cursor:grab; border:1.5px solid transparent; transition:all .18s; user-select:none; position:relative; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.note-card:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,.10); }
.note-card.dragging { opacity:.4; }
.note-card-title { font-size:13px; font-weight:700; }
.note-card-body { font-size:11px; opacity:.75; margin-top:3px; white-space:pre-wrap; }
.note-card-actions { display:flex; gap:4px; margin-top:6px; }
/* Profile avatar upload */
.avatar-upload-wrap { position:relative; display:inline-block; cursor:pointer; }
.avatar-upload-wrap:hover .avatar-overlay { opacity:1; }
.avatar-overlay { position:absolute; inset:0; border-radius:50%; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:600; opacity:0; transition:opacity .2s; border-radius:50%; }
.avatar-img { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--accent-soft); }
@media(max-width:900px){ .cal-layout{ flex-direction:column; } .note-panel{ width:100%; } }
@media(max-width:600px){ .cal-cell{ min-height:60px; } .cal-grid{ gap:2px; } .sticky-note{ font-size:10px; } }
.offline-bar { background:var(--warn); color:#fff; text-align:center; padding:6px; font-size:13px; font-weight:600; display:none; }
.offline-bar.show { display:block; }

/* ===== SETTINGS ===== */
.settings-section { margin-bottom:24px; }
.settings-section h3 { font-size:14px; font-weight:700; color:var(--text-s); margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.period-row { display:grid; grid-template-columns:36px 1fr 1fr 1fr auto; gap:6px; align-items:center; margin-bottom:7px; }
.period-num { font-size:12px; font-weight:700; color:var(--text-s); text-align:center; }
.day-edit-row { display:flex; gap:8px; align-items:center; margin-bottom:7px; }

/* ===== RESPONSIVE ===== */
@media(max-width:900px) { .timetable-layout { flex-direction:column; } .timetable-sidebar { width:100%; } }
@media(max-width:700px) { .sidebar { position:fixed; left:0; top:56px; bottom:0; z-index:150; transform:translateX(-100%); } .sidebar.open { transform:translateX(0); } .body-wrap { overflow:visible; } .form-row,.form-row-3 { grid-template-columns:1fr; } .content-pad { padding:14px; } .topbar { padding:0 14px; } .admin-stat-grid { grid-template-columns:1fr 1fr; } }
@media print { body>*:not(#print-area) { display:none!important; } #print-area { display:block!important; } }
.hidden { display:none!important; }
.flex { display:flex; } .items-center { align-items:center; } .gap-8 { gap:8px; } .gap-12 { gap:12px; }
.mt-8{margin-top:8px} .mt-12{margin-top:12px} .mt-16{margin-top:16px} .mt-20{margin-top:20px}
.mb-8{margin-bottom:8px} .mb-12{margin-bottom:12px} .mb-16{margin-bottom:16px}
hr.soft { border:none; border-top:1px solid var(--border); margin:14px 0; }
.page-title { font-size:20px; font-weight:700; color:var(--text); margin-bottom:18px; }
.scroll-x { overflow-x:auto; }

/* ============================================================
   UX/UI v2 — Design System & Improvements
   ============================================================ */

/* ── Design Tokens ── */
:root {
  --font-xs:11px; --font-sm:12px; --font-body:14px; --font-md:15px;
  --font-lg:18px; --font-xl:22px; --font-2xl:28px;
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:20px; --space-6:24px;
  --tap-min:44px;        /* WCAG minimum touch target */
  --transition:0.18s cubic-bezier(0.4,0,0.2,1);
  --transition-slow:0.3s cubic-bezier(0.4,0,0.2,1);
  --radius-pill:999px;
  /* Accessible contrast versions */
  --text-on-pastel:#2A1040;
  --border-focus:2px solid var(--accent);
  /* Dark mode tokens (default = light) */
  --dm-bg:#1A1225; --dm-card:#241830; --dm-border:#3D2A50;
  --dm-text:#F0E8FF; --dm-text-s:#C0A0E0;
}

/* ── Dark Mode ── */
body.dark-mode {
  --bg:var(--dm-bg); --card:var(--dm-card); --border:var(--dm-border);
  --text:var(--dm-text); --text-s:var(--dm-text-s); --text-t:#8060A8;
  --shadow:rgba(0,0,0,0.4); --accent-soft:#3D2A50;
}
body.dark-mode input,
body.dark-mode select,
body.dark-mode textarea { background:#2E1E42; color:var(--dm-text); border-color:var(--dm-border); }
body.dark-mode .card { background:var(--dm-card); }
body.dark-mode .auth-card { background:#1E1230; }
body.dark-mode .sidebar { background:var(--dm-card); border-color:var(--dm-border); }
body.dark-mode .topbar { background:var(--dm-card); border-color:var(--dm-border); }
.dark-toggle { cursor:pointer; font-size:18px; width:var(--tap-min); height:var(--tap-min); display:flex; align-items:center; justify-content:center; border-radius:10px; border:none; background:transparent; transition:background var(--transition); }
.dark-toggle:hover { background:var(--accent-soft); }

/* ── Toast Notification System ── */
#toast-container {
  position:fixed; bottom:24px; right:24px; z-index:9999;
  display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
.toast {
  display:flex; align-items:center; gap:10px;
  padding:12px 18px; border-radius:12px; max-width:340px;
  font-size:var(--font-body); font-weight:600; color:#fff;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
  pointer-events:all; cursor:pointer;
  animation:toast-in 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
  transition:opacity 0.25s, transform 0.25s;
}
.toast.toast-hiding { animation:toast-out 0.25s ease forwards; }
.toast-success { background:linear-gradient(135deg,#1E9E6B,#27AE60); }
.toast-error   { background:linear-gradient(135deg,#C0392B,#E74C3C); }
.toast-warn    { background:linear-gradient(135deg,#D68910,#F39C12); }
.toast-info    { background:linear-gradient(135deg,var(--accent),var(--p1)); }
.toast-icon    { font-size:18px; flex-shrink:0; }
@keyframes toast-in  { from{opacity:0;transform:translateX(60px) scale(.9)} to{opacity:1;transform:translateX(0) scale(1)} }
@keyframes toast-out { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(12px)} }

/* ── Loading Skeleton ── */
.skeleton {
  background:linear-gradient(90deg,var(--border) 25%,var(--accent-soft) 50%,var(--border) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skeleton-line { height:14px; margin-bottom:8px; border-radius:6px; }
.skeleton-line.short { width:40%; }
.skeleton-line.medium { width:70%; }
.skeleton-line.full { width:100%; }

/* ── Global Loading Overlay ── */
.page-loading {
  position:absolute; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; z-index:10; border-radius:inherit;
}
.page-loading.hidden { display:none; }
.spin { width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-dots { display:flex;gap:6px; }
.loading-dots span { width:8px;height:8px;border-radius:50%;background:var(--accent);animation:dot-bounce 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot-bounce { 0%,80%,100%{transform:scale(0.6);opacity:.5} 40%{transform:scale(1);opacity:1} }

/* ── Empty States ── */
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:48px 24px; text-align:center; gap:14px;
}
.empty-state-art { font-size:72px; line-height:1; filter:drop-shadow(0 4px 8px rgba(0,0,0,.08)); animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.empty-state-title { font-size:var(--font-lg); font-weight:700; color:var(--text); }
.empty-state-body  { font-size:var(--font-body); color:var(--text-s); max-width:280px; line-height:1.6; }
.empty-state-cta   { margin-top:4px; }

/* ── Onboarding ── */
#onboarding-overlay {
  position:fixed; inset:0; background:rgba(20,5,40,0.75);
  z-index:8888; display:flex; align-items:center; justify-content:center; padding:20px;
  backdrop-filter:blur(4px);
}
#onboarding-overlay.hidden { display:none; }
.onboard-card {
  background:var(--card); border-radius:24px; padding:36px 32px;
  max-width:480px; width:100%; text-align:center;
  box-shadow:0 24px 64px rgba(80,20,120,.3);
  animation:onboard-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes onboard-in { from{opacity:0;transform:scale(.85) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
.onboard-step-art  { font-size:80px; margin-bottom:16px; }
.onboard-step-num  { display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text-s);margin-bottom:12px; }
.onboard-dots      { display:flex;gap:6px;justify-content:center;margin:20px 0; }
.onboard-dot       { width:8px;height:8px;border-radius:50%;background:var(--border);transition:all var(--transition); }
.onboard-dot.active{ background:var(--accent);width:20px;border-radius:4px; }
.onboard-actions   { display:flex;gap:10px;margin-top:4px; }
.onboard-actions .btn { flex:1; min-height:var(--tap-min); }

/* ── Improved Buttons (tap target, focus ring) ── */
.btn { min-height:var(--tap-min); position:relative; overflow:hidden; }
.btn::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background:rgba(255,255,255,0); transition:background var(--transition);
}
.btn:hover::after   { background:rgba(255,255,255,0.08); }
.btn:active::after  { background:rgba(0,0,0,0.08); }
.btn:focus-visible  { outline:var(--border-focus); outline-offset:2px; }
.btn-sm { min-height:36px; }
.btn-xs { min-height:30px; }
/* Save button success state */
.btn-saving { pointer-events:none; }
.btn-saved  { background:linear-gradient(135deg,#1E9E6B,#27AE60)!important; color:#fff!important; }

/* ── Form improvements ── */
input:focus, select:focus, textarea:focus {
  border-color:var(--accent); background:#fff;
  box-shadow:0 0 0 3px rgba(160,124,208,0.15);
}
.field-error-msg { font-size:var(--font-xs); color:var(--danger); margin-top:3px; display:none; }
.field-error-msg.show { display:block; }
input.field-error { border-color:var(--danger)!important; box-shadow:0 0 0 3px rgba(231,76,60,0.15)!important; }
input.field-ok    { border-color:#2ECC71!important; }
label { font-size:var(--font-sm); font-weight:600; color:var(--text-s); margin-bottom:5px; cursor:pointer; }

/* ── Timetable Cell improvements ── */
table.timetable th   { font-size:var(--font-sm); padding:9px 6px; }
table.timetable .cell-name  { font-size:var(--font-sm)!important; font-weight:700; }
table.timetable .cell-code  { font-size:var(--font-xs)!important; }
table.timetable .cell-room-info { font-size:var(--font-xs)!important; }
.tt-cell { min-height:68px!important; height:68px!important; }

/* ── Sidebar nav tap target ── */
.nav-item { min-height:var(--tap-min); font-size:var(--font-body); }

/* ── Contrast fix: readable text on pastel ── */
.cell-content    { color:var(--text-on-pastel)!important; }
.cell-code       { color:var(--text-on-pastel)!important; opacity:.75!important; }
.cell-room-info  { color:var(--text-on-pastel)!important; opacity:.8!important; }
.subj-card       { color:var(--text-on-pastel)!important; }
.subj-card-name  { color:var(--text-on-pastel)!important; }
.sticky-note     { color:var(--text-on-pastel)!important; }

/* ── Micro-animations ── */
.card  { transition:box-shadow var(--transition), transform var(--transition); }
.nav-item       { transition:background var(--transition), color var(--transition), transform 0.1s; }
.nav-item:active{ transform:scale(0.97); }
.qa-btn         { transition:all var(--transition); }
.qa-btn:active  { transform:scale(0.95); }
.tt-list-card   { transition:all var(--transition); }
.subj-card      { transition:all var(--transition); }
/* Drag ghost styling */
[draggable]:active { cursor:grabbing; }

/* ── Page transition ── */
.page { animation:page-in 0.2s ease; }
@keyframes page-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── Mobile improvements ── */
@media(max-width:700px){
  :root { --font-body:13px; }
  .content-pad { padding:12px; }
  .topbar { padding:0 12px; height:52px; }
  .quick-actions { grid-template-columns:repeat(4,1fr); gap:8px; }
  .qa-btn { padding:10px 6px; }
  .qa-icon { font-size:20px; }
  .qa-label { font-size:10px; }
  .stat-grid { grid-template-columns:1fr 1fr; }
  /* timetable horizontal scroll hint */
  .timetable-wrap::after {
    content:'← เลื่อนดูตาราง →';
    display:block; text-align:center; font-size:11px;
    color:var(--text-t); padding:6px 0; font-style:italic;
  }
  /* Bigger touch targets in calendar */
  .cal-cell { min-height:52px!important; }
  .cal-add-btn { opacity:1!important; width:22px!important; height:22px!important; }
  /* Inbox layout stack */
  #inbox-layout { grid-template-columns:1fr!important; }
  /* Settings stack */
  #settings-layout { grid-template-columns:1fr!important; }
  /* Toast position */
  #toast-container { bottom:12px; right:12px; left:12px; }
  .toast { max-width:100%; }
  /* Onboarding */
  .onboard-card { padding:28px 20px; }
  .onboard-step-art { font-size:60px; }
}
@media(max-width:400px){
  .quick-actions { grid-template-columns:repeat(3,1fr); }
}

/* ── Breadcrumb ── */
.breadcrumb { display:flex; align-items:center; gap:6px; font-size:var(--font-sm); color:var(--text-s); margin-bottom:12px; }
.breadcrumb-sep { opacity:.4; }
.breadcrumb-cur { color:var(--accent); font-weight:700; }

/* ── Progress bar (for onboarding / loading) ── */
.progress-bar { height:4px; border-radius:2px; background:var(--border); overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent),var(--p2)); transition:width 0.4s ease; }

/* ── Tooltip ── */
[data-tip] { position:relative; }
[data-tip]:hover::before {
  content:attr(data-tip);
  position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:rgba(30,10,50,0.9); color:#fff; border-radius:8px;
  padding:5px 10px; font-size:11px; font-weight:600; white-space:nowrap;
  pointer-events:none; z-index:999;
}
[data-tip]:hover::after {
  content:''; position:absolute; bottom:calc(100% + 2px); left:50%; transform:translateX(-50%);
  border:4px solid transparent; border-top-color:rgba(30,10,50,0.9);
  pointer-events:none; z-index:999;
}
</head>

<script>
// ===================================================

const SUBJ_COLORS = [

const SUBJ_ICONS = ['📚','✏️','🔬','🧪','🎨','🎵','⚽','💻','🌍','📐','🔢','📖','🏃','🎭','💡','🌱','🔭','🎯','🗺️','📊'];
const THEMES = [
  {id:'cat-pink',   label:'🐱 แมวชมพู',    emoji:'🐱', cls:'theme-cat-pink'},
  {id:'cat-purple', label:'🐈 แมวม่วง',    emoji:'🐈', cls:'theme-cat-purple'},
  {id:'cat-mint',   label:'🐈‍⬛ แมวมิ้นท์', emoji:'🐈‍⬛', cls:'theme-cat-mint'},
  {id:'dog-orange', label:'🐶 หมาส้ม',     emoji:'🐶', cls:'theme-dog-orange'},
  {id:'dog-brown',  label:'🐕 หมาน้ำตาล', emoji:'🐕', cls:'theme-dog-brown'},
  {id:'dog-sky',    label:'🦮 หมาฟ้า',     emoji:'🦮', cls:'theme-dog-sky'},
  {id:'capy-yel',   label:'ทองข้าว', emoji:'🌾', cls:'theme-capy-yellow'},
  {id:'capy-green', label:'ทุ่งเขียว', emoji:'🌿', cls:'theme-capy-green'},

];
const DEF_PERIODS = [
  {id:'p1',label:'คาบที่ 1',s:'08:00',e:'09:00',b:false},
  {id:'p2',label:'คาบที่ 2',s:'09:00',e:'10:00',b:false},
  {id:'p3',label:'คาบที่ 3',s:'10:00',e:'11:00',b:false},
  {id:'p4',label:'คาบที่ 4',s:'11:00',e:'12:00',b:false},
  {id:'br',label:'พักกลางวัน',s:'12:00',e:'13:00',b:true},
  {id:'p5',label:'คาบที่ 5',s:'13:00',e:'14:00',b:false},
  {id:'p6',label:'คาบที่ 6',s:'14:00',e:'15:00',b:false},
  {id:'p7',label:'คาบที่ 7',s:'15:00',e:'16:00',b:false},
  {id:'p8',label:'คาบที่ 8',s:'16:00',e:'17:00',b:false},
];
const DEF_DAYS = ['วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์'];

// ===================================================
// STORAGE
// ===================================================
function ls(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function ss(k,v){localStorage.setItem(k,JSON.stringify(v))}
function logActivity(msg){const a=ls('tt_activity')||[];a.unshift({msg,ts:Date.now(),uid:CU?.id||'?'});ss('tt_activity',a.slice(0,100));}

// ===================================================
// SECURITY UTILS
// ===================================================
// SEC-1: Hash passwords with SHA-256 via SubtleCrypto
async function hashPassword(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// SEC-2: Brute-force / login rate limiting
const LOGIN_MAX_ATTEMPTS=5;
const LOGIN_LOCKOUT_MS=5*60*1000; // 5 minutes
function checkLoginRateLimit(){
  const rec=ls('tt_login_attempts')||{count:0,firstAt:0,lockedUntil:0};
  const now=Date.now();
  if(rec.lockedUntil>now){
    const mins=Math.ceil((rec.lockedUntil-now)/60000);
    return{locked:true,msg:`ล็อกอินผิดหลายครั้ง กรุณารอ ${mins} นาที`};
  }
  return{locked:false};
}
function recordLoginFail(){
  const now=Date.now();
  let rec=ls('tt_login_attempts')||{count:0,firstAt:now,lockedUntil:0};
  if(now-rec.firstAt>LOGIN_LOCKOUT_MS){rec={count:0,firstAt:now,lockedUntil:0};}
  rec.count++;
  if(rec.count>=LOGIN_MAX_ATTEMPTS){rec.lockedUntil=now+LOGIN_LOCKOUT_MS;}
  ss('tt_login_attempts',rec);
}
function clearLoginFail(){localStorage.removeItem('tt_login_attempts');}

// SEC-3: Session token — prevent manual localStorage session injection
function genToken(){return crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2)+Date.now().toString(36);}
function createSession(user){
  const token=genToken();
  const sess={...user,_token:token,_issuedAt:Date.now()};
  ss('tt_session',sess);
  ss('tt_token',token); // separate key makes forgery harder
  return sess;
}
function validateSession(sess){
  if(!sess||!sess._token||!sess.id)return false;
  const storedToken=ls('tt_token');
  if(sess._token!==storedToken)return false;
  if(Date.now()-sess._issuedAt>7*24*60*60*1000)return false;
  const users=ls('tt_users')||[];
  const realUser=users.find(u=>u.id===sess.id);
  if(!realUser)return false;
  if(realUser.role!==sess.role)return false;
  // SEC: also reject if user is banned
  if(realUser.status==='banned')return false;
  return true;
}

// SEC-4: Input sanitisation helper — strip dangerous chars from plain text fields
function sanitize(s){
  return String(s||'').trim()
    .replace(/[<>'"]/g,'') // strip HTML/JS injection chars
    .slice(0,200); // max length
}
function sanitizeUsername(s){
  return String(s||'').trim().toLowerCase()
    .replace(/[^a-z0-9_\-.ก-๙]/gi,'') // allow thai + alphanumeric only
    .slice(0,50);
}
function sanitizeEmail(s){
  return String(s||'').trim().toLowerCase().slice(0,150);
}

// SEC-5: Admin privilege check — call before any admin action
function requireAdmin(action=''){
  if(!CU){doLogout();return false;}
  const users=ls('tt_users')||[];
  const real=users.find(u=>u.id===CU.id);
  if(!real||real.role!=='admin'){
    alert('⛔ ไม่มีสิทธิ์ดำเนินการนี้');
    logActivity(`⚠️ ความพยายามเข้าถึง admin โดยไม่มีสิทธิ์: ${CU.id} - ${action}`);
    return false;
  }
  return true;
}

// SEC-6: Ownership check — user can only modify their own data
function requireOwnership(targetUid){
  if(!CU)return false;
  if(CU.id===targetUid)return true;
  const users=ls('tt_users')||[];
  const real=users.find(u=>u.id===CU.id);
  if(real&&real.role==='admin')return true;
  logActivity(`⚠️ ความพยายามเข้าถึงข้อมูลผู้อื่น: ${CU.id} → ${targetUid}`);
  return false;
}

// SEC-7: localStorage size guard — prevent DoS via storage stuffing
function checkStorageQuota(){
  try{
    let total=0;
    for(let k in localStorage){if(k.startsWith('tt_'))total+=localStorage[k].length;}
    if(total>4*1024*1024){// 4MB limit per user namespace
      console.warn('Storage quota warning: '+total+' bytes');
      return false;
    }
    return true;
  }catch{return true;}
}

// Init admin — only if no users exist yet
if(!ls('tt_users')){
  (async()=>{
    const pwHash=await hashPassword('admin1234');
    ss('tt_users',[{id:'admin',username:'admin',email:'admin@app.th',password:pwHash,name:'ผู้ดูแลระบบ',school:'',grade:'',addr:'',sub:'',dist:'',prov:'',role:'admin',createdAt:Date.now()}]);
  })();
}

// Load and validate session
let rawSession = ls('tt_session');
let CU = validateSession(rawSession) ? rawSession : null;
if(rawSession && !CU){
  // Invalid/tampered session — force logout silently
  localStorage.removeItem('tt_session');
  localStorage.removeItem('tt_token');
}

// ===================================================
// AUTH
// ===================================================
function switchAuthTab(t){
  const isLogin = t==='login';
  document.getElementById('tab-login').classList.toggle('hidden',!isLogin);
  document.getElementById('tab-register').classList.toggle('hidden',isLogin);
  document.getElementById('tab-login-btn').className='btn btn-full btn-sm '+(isLogin?'btn-primary':'btn-ghost');
  document.getElementById('tab-reg-btn').className='btn btn-full btn-sm '+(isLogin?'btn-ghost':'btn-primary');
  document.getElementById('auth-msg').innerHTML='';
}
function authMsg(m,ok=false){document.getElementById('auth-msg').innerHTML=`<div class="msg ${ok?'msg-ok':'msg-err'}">${m}</div>`}
async function doLogin(){
  const rl=checkLoginRateLimit();
  if(rl.locked)return authMsg(rl.msg);
  const id=sanitize(document.getElementById('l-id').value.trim());
  const pw=document.getElementById('l-pw').value;
  if(!id||!pw)return authMsg('กรุณากรอกข้อมูลให้ครบ');
  if(pw.length>128)return authMsg('รหัสผ่านยาวเกินไป');
  const pwHash=await hashPassword(pw);
  const users=ls('tt_users')||[];
  const u=users.find(u=>(u.username===id||u.email===id)&&u.password===pwHash);
  if(!u){
    recordLoginFail();
    const rec=ls('tt_login_attempts')||{};
    const remaining=Math.max(0,LOGIN_MAX_ATTEMPTS-(rec.count||0));
    return authMsg(`ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง${remaining>0?' (เหลืออีก '+remaining+' ครั้ง)':''}`);
  }
  clearLoginFail();
  const sess=createSession(u);
  CU=sess;
  logActivity(`${u.name||u.username} เข้าสู่ระบบ`);
  initApp();
}
async function doRegister(){
  // Validate all fields with visual feedback
  if(!validateAllRegisterFields())return authMsg('กรุณากรอกข้อมูลในช่องที่เป็นสีแดงให้ถูกต้อง');
  if(!document.getElementById('r-confirm').checked)return authMsg('กรุณายืนยันว่าตรวจสอบข้อมูลแล้ว');
  const rawUsername=document.getElementById('r-user').value;
  const rawEmail=document.getElementById('r-email').value;
  const pw=document.getElementById('r-pw').value;
  const username=sanitizeUsername(rawUsername);
  const email=sanitizeEmail(rawEmail);
  const name=sanitize(document.getElementById('r-name').value);
  const school=sanitize(document.getElementById('r-school').value);
  const grade=sanitize(document.getElementById('r-grade').value);
  if(!username||!email||!pw||!name||!school||!grade)return authMsg('กรุณากรอกข้อมูลที่มี * ให้ครบ');
  if(username!==rawUsername.trim().toLowerCase())return authMsg('ชื่อผู้ใช้ใช้ได้เฉพาะตัวอักษร ตัวเลข _ - และภาษาไทย');
  // SEC: Password must have letters+numbers, min 8
  if(!/^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(pw))return authMsg('รหัสผ่านต้องมีอย่างน้อย 8 ตัว และมีทั้งตัวอักษรและตัวเลข');
  if(pw.length>128)return authMsg('รหัสผ่านยาวเกินไป');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return authMsg('รูปแบบอีเมลไม่ถูกต้อง');
  const users=ls('tt_users')||[];
  if(users.length>=50)return authMsg('ระบบรองรับสมาชิกสูงสุด 50 คน — เต็มแล้ว');
  if(users.find(u=>u.username===username))return authMsg('ชื่อผู้ใช้นี้ถูกใช้งานแล้ว');
  if(users.find(u=>u.email===email))return authMsg('อีเมลนี้ถูกใช้งานแล้ว');

function renderTTTable(wrapperId, ttId, uid, readOnly=false){
  const settings=ls('tt_settings_'+uid)||{periods:DEF_PERIODS.map(p=>({...p})),days:[...DEF_DAYS]};
  const subjects=ls('tt_subj_'+uid)||[];
  const slots=ls('tt_slots_'+uid+'_'+ttId)||{};
  const days=settings.days;
  const periods=settings.periods;
  // Merge map
  const mm={};
  days.forEach((d,di)=>{
    mm[di]={};
    const np=periods.filter(p=>!p.b);
    let i=0;
    while(i<np.length){
      const p=np[i];
      const k=`${di}_${p.id}`;
      const sId=slots[k]||null;
      if(sId){
        let span=1;
        while(i+span<np.length&&slots[`${di}_${np[i+span].id}`]===sId)span++;
        mm[di][p.id]={sId,span,first:true};
        for(let j=1;j<span;j++)mm[di][np[i+j].id]={hidden:true};
        i+=span;
      }else{mm[di][p.id]={sId:null,span:1,first:true};i++;}
    }
  });
  let html=`<table class="timetable"><thead><tr><th>วัน</th>`;
  periods.forEach(p=>{
    if(p.b)html+=`<th style="background:linear-gradient(135deg,#FFF9C4,#FFFDE7);color:#B8860B;font-size:10px;">${escH(p.label)}</th>`;
    else html+=`<th>${escH(p.label)}<span class="th-period-time">${p.s}–${p.e}</span></th>`;
  });
  html+=`</tr></thead><tbody>`;
  days.forEach((day,di)=>{
    html+=`<tr><td class="th-day" style="background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-size:12px;font-weight:700;padding:7px 8px;border-radius:8px;text-align:center;vertical-align:middle;cursor:pointer;white-space:nowrap;" onclick="editDayLabel(${di})">${escH(day)}</td>`;
    periods.forEach(p=>{
      if(p.b){
        html+=`<td class="tt-cell break-cell"><div class="break-inner">🍱<span style="font-size:10px;">${escH(p.label)}</span></div></td>`;
        return;
      }
      const m=mm[di]?.[p.id];
      if(!m||m.hidden)return;
      const s=m.sId?subjects.find(x=>x.id===m.sId):null;
      const col=s?(SUBJ_COLORS.find(c=>c.k===s.ck)||SUBJ_COLORS[0]):null;
      const cs=m.span>1?` colspan="${m.span}"`:'';
      if(s){
        html+=`<td class="tt-cell has-subj${m.span>1?' merged':''}"${cs} style="background:${col.bg};border-color:${col.bd};"
          ${readOnly?'':`ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="onDrop(event,${di},'${p.id}',this)"`}>
          <div class="cell-content" style="background:${col.bg};color:${col.tx};"
            ${readOnly?'':`draggable="true" ondragstart="onCellDrag(event,${di},'${p.id}')" ondragend="this.style.opacity='1'"`}
            onclick="showCellDetail('${m.sId}')">
            ${readOnly?'':`<button class="cell-del-btn" onclick="event.stopPropagation();clearCell(${di},'${p.id}','${ttId}','${uid}')">✕</button>`}
            <div class="cell-icon">${s.ico||'📚'}</div>
            <div class="cell-code">${escH(s.code)}</div>
            <div class="cell-name">${escH(s.name)}</div>
            <div class="cell-room-info">${s.room?'🏫'+escH(s.room):''}${s.teacher?' 👨‍🏫'+escH(s.teacher):''}</div>
          </div></td>`;
      }else{
        html+=`<td class="tt-cell"${cs}
          ${readOnly?'':`ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="onDrop(event,${di},'${p.id}',this)"`}
          data-day="${di}" data-pid="${p.id}"></td>`;
      }
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table>`;
  const wrapper=document.getElementById(wrapperId);
  if(!wrapper){// for admin create div
    const d=document.createElement('div');d.id=wrapperId;d.style.overflowX='auto';
    document.getElementById('admin-tt-area').appendChild(d);d.innerHTML=html;
  }else wrapper.innerHTML=html;
}

function onCellDrag(e,di,pid){dragSrcDay=di;dragSrcPid=pid;e.dataTransfer.setData('fromCell','1');e.target.style.opacity='.4';}
function onDrop(e,di,pid,cell){
  e.preventDefault();cell.classList.remove('drag-over');
  if(!CU||!activeTTId)return;
  const slots=getSlots(activeTTId);
  const fromCell=e.dataTransfer.getData('fromCell');
  if(fromCell==='1'&&dragSrcDay!==null&&dragSrcPid!==null){
    const mv=slots[`${dragSrcDay}_${dragSrcPid}`];
    if(mv){slots[`${di}_${pid}`]=mv;delete slots[`${dragSrcDay}_${dragSrcPid}`];}
    dragSrcDay=null;dragSrcPid=null;
  }else{
    const sid=e.dataTransfer.getData('subjId');
    // SEC: validate sid belongs to current user's subjects
    if(sid){
      const validSubj=getUserSubjects().find(s=>s.id===sid);
      if(validSubj)slots[`${di}_${pid}`]=sid;
      else console.warn('SEC: invalid subjId dropped:',sid);
    }
  }
  saveSlots(activeTTId,slots);
  logActivity(`${CU.name||CU.username} แก้ไขตาราง`);
  renderTTTable('tt-wrap',activeTTId,CU.id);
}
function clearCell(di,pid,ttId,uid){
  const settings=ls('tt_settings_'+uid)||{periods:DEF_PERIODS.map(p=>({...p})),days:[...DEF_DAYS]};
  const slots=ls('tt_slots_'+uid+'_'+ttId)||{};
  const subjId=slots[`${di}_${pid}`];
  if(subjId){
    // Clear all consecutive slots with the same subject (undo merge)
    const np=settings.periods.filter(p=>!p.b);
    const startIdx=np.findIndex(p=>p.id===pid);
    if(startIdx>=0){
      for(let j=startIdx;j<np.length;j++){
        if(slots[`${di}_${np[j].id}`]===subjId) delete slots[`${di}_${np[j].id}`];
        else break;
      }
    }else{delete slots[`${di}_${pid}`];}
  }
  ss('tt_slots_'+uid+'_'+ttId,slots);
  renderTTTable('tt-wrap',ttId,uid);
}
function showCellDetail(sid){
  const s=getUserSubjects().find(x=>x.id===sid);
  if(!s)return;
  const col=SUBJ_COLORS.find(c=>c.k===s.ck)||SUBJ_COLORS[0];
  document.getElementById('cell-detail').innerHTML=`
    <div style="background:${col.bg};color:${col.tx};border-radius:12px;padding:14px;margin-bottom:10px;">
      <div style="font-size:20px;margin-bottom:6px;">${s.ico||'📚'}</div>

      <div><span style="color:var(--text-s);">ครูผู้สอน</span><p style="font-weight:600;">${escH(s.teacher||'-')}</p></div>
    </div>`;
  openModal('modal-cell');
}

function saveSubject(){
  const code=sanitize(document.getElementById('sm-code').value);
  const name=sanitize(document.getElementById('sm-name').value);
  if(!code||!name){document.getElementById('sm-msg').innerHTML='<div class="msg msg-err">กรุณากรอกรหัสวิชาและชื่อวิชา</div>';return;}
  const ico=document.querySelector('.icon-opt.sel')?.textContent||'📚';
  const safeIco=SUBJ_ICONS.includes(ico)?ico:'📚'; // whitelist
  const ck=document.querySelector('.color-swatch.sel')?.dataset.ck||'lav';
  const safeCk=SUBJ_COLORS.find(c=>c.k===ck)?ck:'lav'; // whitelist
  const room=sanitize(document.getElementById('sm-room').value);
  const teacher=sanitize(document.getElementById('sm-teacher').value);
  const subjects=getUserSubjects();
  const editId=document.getElementById('sm-id').value;
  if(!editId&&subjects.length>=50){
    document.getElementById('sm-msg').innerHTML='<div class="msg msg-err">สร้างวิชาได้สูงสุด 50 วิชา</div>';return;
  }
  if(editId){
    // Ownership: editId must belong to this user
    const idx=subjects.findIndex(x=>x.id===editId);

  }else{
    subjects.push({id:'s'+Date.now(),code,name,ico:safeIco,ck:safeCk,room,teacher});
  }
  saveUserSubjects(subjects);
  closeModal('modal-subj');
  renderSubjPanel();

}
function deleteSubject(id){
  if(!confirm('ลบวิชานี้? วิชาจะหายออกจากช่องตารางทั้งระบบด้วย'))return;
  let subjects=getUserSubjects().filter(x=>x.id!==id);
  saveUserSubjects(subjects);
  // Clear from all timetable slots for this user
  const tts=ls('tt_list_'+CU.id)||[];
  tts.forEach(tt=>{
    const slots=ls('tt_slots_'+CU.id+'_'+tt.id)||{};
    let changed=false;

  });
  renderSubjPanel();
  if(activeTTId)renderTTTable('tt-wrap',activeTTId,CU.id);
}

function checkPwStrength(){
  const pw=document.getElementById('pe-new-pw').value;
  const hint=document.getElementById('pw-strength-hint');
  if(!pw){hint.innerHTML='';return;}
  let score=0,tips=[];
  if(pw.length>=8)score++;else tips.push('อย่างน้อย 8 ตัว');
  if(/[A-Z]/.test(pw))score++;else tips.push('ตัวพิมพ์ใหญ่');
  if(/[0-9]/.test(pw))score++;else tips.push('ตัวเลข');
  if(/[^A-Za-z0-9]/.test(pw))score++;else tips.push('อักขระพิเศษ');
  const levels=[
    {label:'อ่อนมาก',color:'#E74C3C'},
    {label:'อ่อน',color:'#E67E22'},
    {label:'ปานกลาง',color:'#F1C40F'},
    {label:'แข็งแรง',color:'#2ECC71'},
    {label:'แข็งแรงมาก',color:'#27AE60'},
  ];
  const lv=levels[score]||levels[0];
  hint.innerHTML=`<span style="color:${lv.color};font-weight:700;">● ${lv.label}</span>${tips.length?' — ควรเพิ่ม: '+tips.join(', '):''}`;
}

async function saveAccountChanges(){
  const msgEl=document.getElementById('profile-account-msg');
  msgEl.innerHTML='';
  const currentPw=document.getElementById('pe-current-pw').value;
  const newUsername=document.getElementById('pe-new-username').value.trim();
  const newEmail=document.getElementById('pe-new-email').value.trim();
  const newPw=document.getElementById('pe-new-pw').value;
  const confirmPw=document.getElementById('pe-confirm-pw').value;

  // Must provide current password
  if(!currentPw){
    msgEl.innerHTML='<div class="msg msg-err">กรุณากรอกรหัสผ่านปัจจุบันก่อน</div>';return;
  }
  // Must change at least one thing
  if(!newUsername&&!newEmail&&!newPw){
    msgEl.innerHTML='<div class="msg msg-warn">กรุณากรอกข้อมูลที่ต้องการเปลี่ยนอย่างน้อย 1 ช่อง</div>';return;
  }

  // SEC: Verify current password
  const currentHash=await hashPassword(currentPw);
  const users=ls('tt_users')||[];
  const i=users.findIndex(u=>u.id===CU.id);
  if(i<0){msgEl.innerHTML='<div class="msg msg-err">ไม่พบบัญชีนี้</div>';return;}
  if(users[i].password!==currentHash){
    msgEl.innerHTML='<div class="msg msg-err">รหัสผ่านปัจจุบันไม่ถูกต้อง</div>';
    recordLoginFail();return;
  }

  // Validate new username
  if(newUsername){
    const safeUsername=sanitizeUsername(newUsername);
    if(safeUsername!==newUsername){
      msgEl.innerHTML='<div class="msg msg-err">ชื่อผู้ใช้ใช้ได้เฉพาะ a-z, 0-9, _ และภาษาไทย</div>';return;
    }
    if(newUsername.length<3){
      msgEl.innerHTML='<div class="msg msg-err">ชื่อผู้ใช้ต้องมีอย่างน้อย 3 ตัวอักษร</div>';return;
    }
    if(users.find(u=>u.username===newUsername&&u.id!==CU.id)){
      msgEl.innerHTML='<div class="msg msg-err">ชื่อผู้ใช้นี้ถูกใช้แล้ว</div>';return;
    }
  }

  // Validate new email
  if(newEmail){
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail)){
      msgEl.innerHTML='<div class="msg msg-err">รูปแบบอีเมลไม่ถูกต้อง</div>';return;
    }
    if(users.find(u=>u.email===newEmail&&u.id!==CU.id)){
      msgEl.innerHTML='<div class="msg msg-err">อีเมลนี้ถูกใช้แล้ว</div>';return;
    }
  }

  // Validate new password
  if(newPw){
    if(newPw.length<8){
      msgEl.innerHTML='<div class="msg msg-err">รหัสผ่านใหม่ต้องมีอย่างน้อย 8 ตัวอักษร</div>';return;
    }
    if(newPw.length>128){
      msgEl.innerHTML='<div class="msg msg-err">รหัสผ่านยาวเกินไป</div>';return;
    }
    if(newPw!==confirmPw){
      msgEl.innerHTML='<div class="msg msg-err">รหัสผ่านใหม่ไม่ตรงกัน</div>';return;
    }
    // Prevent reusing same password
    const newHash=await hashPassword(newPw);
    if(newHash===users[i].password){
      msgEl.innerHTML='<div class="msg msg-err">รหัสผ่านใหม่ต้องไม่เหมือนรหัสเดิม</div>';return;
    }
  }

  // Apply changes
  const changes=[];
  if(newUsername){users[i].username=sanitizeUsername(newUsername);changes.push('ชื่อผู้ใช้');}
  if(newEmail){users[i].email=sanitizeEmail(newEmail);changes.push('อีเมล');}
  if(newPw){users[i].password=await hashPassword(newPw);changes.push('รหัสผ่าน');}

  ss('tt_users',users);
  // Re-issue session
  const newSess=createSession(users[i]);CU=newSess;
  logActivity(`${CU.name||CU.username} เปลี่ยน${changes.join('/')}`);

  // Clear fields
  ['pe-current-pw','pe-new-username','pe-new-email','pe-new-pw','pe-confirm-pw'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('pw-strength-hint').innerHTML='';

  msgEl.innerHTML=`<div class="msg msg-ok">✅ เปลี่ยน${changes.join('/')}สำเร็จ!</div>`;

  // Update UI
  renderProfile();
  const n=CU.name||CU.username;
  document.getElementById('top-uname').textContent=n;
  document.getElementById('sb-name').textContent=n;
  // If password changed → warn to re-login (but don't force)
  if(changes.includes('รหัสผ่าน')){
    setTimeout(()=>{
      msgEl.innerHTML='<div class="msg msg-ok">✅ เปลี่ยนรหัสผ่านสำเร็จ กรุณา login ใหม่เพื่อความปลอดภัย</div>';
    },1500);
  }
}

function sendReport(){
  const subj=sanitize(document.getElementById('rep-subject').value);
  const body=sanitize(document.getElementById('rep-body').value).slice(0,1000);
  if(!subj||!body){document.getElementById('rep-msg').innerHTML='<div class="msg msg-err">กรุณากรอกข้อมูลให้ครบ</div>';return;}
  if(!CU)return;
  const tickets=ls('tt_tickets')||[];
  // Rate limit: max 5 tickets per user per hour
  const recentByUser=tickets.filter(t=>t.uid===CU.id&&Date.now()-t.ts<3600000);
  if(recentByUser.length>=5){document.getElementById('rep-msg').innerHTML='<div class="msg msg-warn">ส่งรายงานได้สูงสุด 5 ครั้งต่อชั่วโมง</div>';return;}
  tickets.unshift({id:'t'+Date.now(),uid:CU.id,uname:escH(CU.name||CU.username),subj,body,ts:Date.now(),read:false});
  ss('tt_tickets',tickets.slice(0,500)); // cap at 500 tickets
  document.getElementById('rep-subject').value='';
  document.getElementById('rep-body').value='';
  document.getElementById('rep-msg').innerHTML='<div class="msg msg-ok">ส่งรายงานเรียบร้อย ขอบคุณที่แจ้ง! 🙏</div>';
  updateAdminBadge();
  logActivity(`${CU.name||CU.username} แจ้งปัญหา: ${subj}`);
  setTimeout(()=>document.getElementById('rep-msg').innerHTML='',3000);
}

function applyTheme(id,save=true){

  const allThemeCls=THEMES.map(x=>x.cls);
  document.body.classList.remove(...allThemeCls);
  document.body.classList.add(t.cls);
  document.getElementById('top-emoji').textContent=t.emoji;
  document.getElementById('auth-emoji').textContent=t.emoji;
  const heroEl=document.getElementById('hero-emoji');
  if(heroEl)heroEl.textContent=t.emoji;
  if(save&&CU){ss('tt_theme_'+CU.id,id);buildThemeGrid();}
}

async function exportPDF(sz,btnEl){
  if(!activeTTId){alert('กรุณาเลือกตารางก่อน');return;}
  const btn=btnEl||null;
  if(btn){btn.disabled=true;btn.textContent='⏳';}
  try{
    const {jsPDF}=window.jspdf;
    const el=document.getElementById('tt-wrap');
    if(!el||!el.querySelector('table')){alert('ไม่พบตาราง กรุณาเปิดหน้าตารางก่อน');return;}
    const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'});
    const img=canvas.toDataURL('image/png');
    const isA4=sz==='A4';
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:isA4?'a4':'a5'});
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    const m=8,iw=pw-m*2,ih=(canvas.height/canvas.width)*iw;
    const meta=getUserTTMeta(activeTTId)||{};
    try{
      const headerTxt=`${CU.name||CU.username} | ${CU.school||''} | ${CU.grade||''} | ${meta.advisor?'ครูที่ปรึกษา: '+meta.advisor:''} ${meta.phone?'โทร:'+meta.phone:''}`;
      pdf.setFontSize(9);pdf.setTextColor(100,60,150);
      pdf.text(headerTxt,m,m-1);
    }catch(e){/* skip header if font issue */}
    pdf.addImage(img,'PNG',m,m+2,iw,Math.min(ih,ph-m*2-6));
    const ttName=(ls('tt_list_'+CU.id)||[]).find(t=>t.id===activeTTId)?.name||'timetable';
    pdf.save(`${ttName}-${sz}.pdf`);
  }catch(err){alert('เกิดข้อผิดพลาดในการสร้าง PDF: '+err.message);}
  finally{if(btn){btn.disabled=false;btn.textContent=`📄 ${sz}`;}}
}

function renderCalendar(){
  // Header
  document.getElementById('cal-month-label').textContent = `${MONTH_TH[calMonth]} ${calYear+543}`;
  // Day names
  document.getElementById('cal-day-names').innerHTML = CAL_DAY_TH.map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  // Cells
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();
  const notes = getUserNotes();
  let cells = '';
  // prev month days
  for(let i=firstDay-1; i>=0; i--){
    cells += `<div class="cal-cell other-month"><div class="cal-date-num">${daysInPrev-i}</div></div>`;
  }
  // this month
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const dayNotes = notes.filter(n=>n.date===dateStr);
    const notesHtml = dayNotes.slice(0,3).map(n=>{
      const col = NOTE_COLORS.find(c=>c.k===n.colorKey)||NOTE_COLORS[0];
      return `<div class="sticky-note" style="background:${col.bg};color:${col.tx};border:1px solid ${col.bd};"
        draggable="true"
        ondragstart="calNoteDragStart(event,'${n.id}')"
        ondragend="this.classList.remove('dragging')"
        onclick="viewNote('${n.id}')">
        <div class="note-actions">
          <button class="note-act-btn" onclick="event.stopPropagation();openNoteModal('${n.id}')" title="แก้ไข">✏️</button>
          <button class="note-act-btn" onclick="event.stopPropagation();deleteNote('${n.id}')" title="ลบ" style="color:#C0392B;">✕</button>
        </div>
        ${escH(n.title)}
      </div>`;
    }).join('');
    const moreHtml = dayNotes.length>3 ? `<div style="font-size:10px;color:var(--text-s);padding:2px 4px;">+${dayNotes.length-3} อีก...</div>` : '';
    cells += `<div class="cal-cell${isToday?' today':''}"
      ondragover="event.preventDefault();this.classList.add('drag-over-cal')"
      ondragleave="this.classList.remove('drag-over-cal')"
      ondrop="calNoteDrop(event,'${dateStr}',this)">
      <div class="cal-date-num${isToday?' today-num':''}">
        <span>${d}</span>
        <button class="cal-add-btn" onclick="openNoteModal(null,'${dateStr}')" title="เพิ่มโน๊ต">+</button>
      </div>
      <div class="cal-notes">${notesHtml}${moreHtml}</div>
    </div>`;
  }
  // next month padding
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells%7===0 ? 0 : 7-(totalCells%7);
  for(let i=1; i<=remaining; i++){
    cells += `<div class="cal-cell other-month"><div class="cal-date-num">${i}</div></div>`;
  }
  document.getElementById('cal-cells').innerHTML = cells;
  renderNotePanel();
}

function formatCalDate(dateStr){
  if(!dateStr) return '';
  const [y,m,d] = dateStr.split('-').map(Number);
  return `${d} ${MONTH_TH[m-1]} ${y+543}`;
}

function calNav(dir){
  calMonth += dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

function calNoteDragStart(e, noteId){
  calDragNoteId = noteId;
  e.dataTransfer.setData('calNoteId', noteId);
  e.currentTarget.classList.add('dragging');
}

function calNoteDrop(e, dateStr, cell){
  e.preventDefault();
  cell.classList.remove('drag-over-cal');
  const noteId = e.dataTransfer.getData('calNoteId') || calDragNoteId;
  if(!noteId) return;
  const notes = getUserNotes();
  const idx = notes.findIndex(n=>n.id===noteId);
  if(idx>=0){ notes[idx].date = dateStr; saveUserNotes(notes); renderCalendar(); }
  calDragNoteId = null;
}

function openNoteModal(editId=null, prefillDate=''){
  document.getElementById('note-edit-id').value = editId||'';
  document.getElementById('note-modal-h').textContent = editId ? '✏️ แก้ไขโน๊ต' : '✏️ สร้างโน๊ตใหม่';
  document.getElementById('note-modal-msg').innerHTML = '';
  const n = editId ? getUserNotes().find(x=>x.id===editId) : null;
  document.getElementById('note-title').value = n?.title||'';
  document.getElementById('note-body').value = n?.body||'';
  document.getElementById('note-date').value = n?.date||prefillDate||'';
  // Color picker
  const cg = document.getElementById('note-color-grid');
  const selKey = n?.colorKey||'yellow';
  cg.innerHTML = NOTE_COLORS.map(c=>`<div class="color-swatch${c.k===selKey?' sel':''}"
    style="background:${c.bg};border-color:${c.bd};" data-ck="${c.k}"
    onclick="document.querySelectorAll('#note-color-grid .color-swatch').forEach(x=>x.classList.remove('sel'));this.classList.add('sel');">
  </div>`).join('');
  openModal('modal-note');
  setTimeout(()=>document.getElementById('note-title').focus(),80);
}

function saveNote(){
  const title = sanitize(document.getElementById('note-title').value);
  if(!title){ document.getElementById('note-modal-msg').innerHTML='<div class="msg msg-err">กรุณาใส่หัวข้อโน๊ต</div>'; return; }
  const body = sanitize(document.getElementById('note-body').value).slice(0,500);
  const date = document.getElementById('note-date').value;
  const colorKey = document.querySelector('#note-color-grid .color-swatch.sel')?.dataset.ck||'yellow';
  const safeColorKey = NOTE_COLORS.find(c=>c.k===colorKey)?colorKey:'yellow';
  const notes = getUserNotes();
  const editId = document.getElementById('note-edit-id').value;
  if(editId){
    const idx = notes.findIndex(n=>n.id===editId);
    if(idx>=0) notes[idx] = {...notes[idx], title, body, date, colorKey:safeColorKey, updatedAt:Date.now()};
  } else {
    if(notes.length>=200){ document.getElementById('note-modal-msg').innerHTML='<div class="msg msg-err">โน๊ตเต็มแล้ว (สูงสุด 200 โน๊ต)</div>'; return; }
    notes.unshift({id:'n'+Date.now(), title, body, date, colorKey:safeColorKey, createdAt:Date.now()});
  }
  saveUserNotes(notes);
  closeModal('modal-note');
  renderCalendar();
}

function deleteNote(id){
  if(!confirm('ลบโน๊ตนี้?')) return;
  const notes = getUserNotes().filter(n=>n.id!==id);
  saveUserNotes(notes);
  renderCalendar();
}

  const n = getUserNotes().find(x=>x.id===id);

function handleAvatarUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ alert('กรุณาเลือกไฟล์รูปภาพ'); return; }
  if(file.size > 5*1024*1024){ alert('ไฟล์ใหญ่เกินไป กรุณาใช้ไฟล์ไม่เกิน 5MB'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      // Resize/crop to 850x850
      const canvas = document.createElement('canvas');
      canvas.width = 850; canvas.height = 850;
      const ctx = canvas.getContext('2d');
      // Center crop
      const minSide = Math.min(img.width, img.height);
      const sx = (img.width - minSide)/2;
      const sy = (img.height - minSide)/2;
      ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, 850, 850);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      // Save
      ss('tt_avatar_'+CU.id, dataUrl);
      applyAvatarToUI(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyAvatarToUI(dataUrl){
  if(!dataUrl) return;
  // Profile page
  const imgEl = document.getElementById('profile-big-av-img');
  const avEl = document.getElementById('profile-big-av');
  if(imgEl && avEl){
    imgEl.src = dataUrl;
    imgEl.style.display = 'block';
    avEl.style.display = 'none';
  }
  // Sidebar & topbar avatar
  ['sb-avatar','top-avatar'].forEach(id=>{
    const el = document.getElementById(id);
    if(el){
      el.style.backgroundImage = `url(${dataUrl})`;
      el.style.backgroundSize = 'cover';
      el.style.backgroundPosition = 'center';
      el.textContent = '';
    }
  });
}

function loadAvatarFromStorage(){
  const dataUrl = ls('tt_avatar_'+CU?.id);
  if(dataUrl) applyAvatarToUI(dataUrl);
}

  let html=`<table class="preview-table"><thead><tr><th style="min-width:50px;">วัน</th>`;

    else html+=`<th>${escH(p.label.replace('คาบที่',''))}<br><span style="opacity:.7;">${p.s}</span></th>`;
  });
  html+=`</tr></thead><tbody>`;
  cfg.days.forEach((d,di)=>{

// Period drag-sort
function onPeriodDragStart(e,i){dragSrcPeriod=i;setTimeout(()=>document.querySelectorAll('.period-item')[i]?.classList.add('dragging-item'),0);}
function onPeriodDragOver(e,i){e.preventDefault();if(i===dragSrcPeriod)return;document.querySelectorAll('.period-item').forEach(x=>x.classList.remove('drag-target'));document.querySelectorAll('.period-item')[i]?.classList.add('drag-target');}
function onPeriodDrop(e,i){
  e.preventDefault();
  if(dragSrcPeriod===null||dragSrcPeriod===i)return;
  const cfg=getUserSettings();
  const moved=cfg.periods.splice(dragSrcPeriod,1)[0];
  cfg.periods.splice(i,0,moved);
  saveUserSettings(cfg);dragSrcPeriod=null;
  renderSettings();
}

function submitNewTicket(){
  const subj=sanitize(document.getElementById('ticket-subject-inp').value);
  const body=sanitize(document.getElementById('ticket-body-inp').value).slice(0,600);
  const cat=document.getElementById('ticket-category').value;
  if(!subj||!body){document.getElementById('new-ticket-msg').innerHTML='<div class="msg msg-err">กรุณากรอกข้อมูลให้ครบ</div>';return;}
  const tickets=getTickets();
  // Rate limit: 5 per hour
  const recent=tickets.filter(t=>t.uid===CU.id&&Date.now()-t.ts<3600000);
  if(recent.length>=5){document.getElementById('new-ticket-msg').innerHTML='<div class="msg msg-warn">ส่งได้สูงสุด 5 ครั้ง/ชั่วโมง</div>';return;}
  const ticket={
    id:'tk'+Date.now(), uid:CU.id, uname:escH(CU.name||CU.username),
    subj, cat, ts:Date.now(), resolved:false, read:false,
    messages:[{id:'m'+Date.now(),from:CU.id,fromName:CU.name||CU.username,role:CU.role,text:body,ts:Date.now()}]
  };
  tickets.unshift(ticket);
  saveTickets(tickets);
  logActivity(`${CU.name||CU.username} แจ้งปัญหา: ${subj}`);
  updateAdminBadge();
  closeModal('modal-new-ticket');
  renderInbox();
  openTicket(ticket.id);
}
